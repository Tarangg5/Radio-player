<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Live Sports Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: black; }
        .input-area { margin: 20px 0; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #e91e63; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #c2185b; }
    </style>
</head>
<body>

    <h2>Live Sports Stream Player</h2>

    <div class="input-area">
        <input type="text" id="streamUrl" placeholder="Apna .m3u8 link yahan paste karein...">
        <button onclick="playStream()">Play</button>
    </div>

    <video id="video" controls></video>

    <script>
        function playStream() {
            var video = document.getElementById('video');
            var streamUrl = document.getElementById('streamUrl').value.trim();

            if (!streamUrl) {
                alert("Pehle link toh dalo!");
                return;
            }

            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }
    </script>

</body>
</html>
