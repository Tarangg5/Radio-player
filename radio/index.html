<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal DRM Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 12px; }
        video { width: 100%; border-radius: 8px; background: black; margin-top: 15px; }
        .controls { display: grid; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; }
        .drm-box { display: flex; gap: 10px; }
        .drm-box input { flex: 1; }
        button { padding: 12px; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { font-size: 0.8em; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Universal Sports Player</h2>
    
    <div class="controls">
        <input type="text" id="manifestUrl" placeholder="Paste .m3u8 or .mpd link here...">
        
        <div class="drm-box">
            <input type="text" id="keyId" placeholder="DRM Key ID (Optional)">
            <input type="text" id="key" placeholder="DRM Key (Optional)">
        </div>
        
        <button onclick="initPlayer()">Play Stream</button>
    </div>

    <video id="video" controls autoplay></video>
    <div id="status" class="status">Supports: HLS, DASH, Widevine ClearKey</div>
</div>

<script>
    async function initPlayer() {
        const manifestUri = document.getElementById('manifestUrl').value.trim();
        const keyId = document.getElementById('keyId').value.trim();
        const key = document.getElementById('key').value.trim();
        const video = document.getElementById('video');

        if (!manifestUri) return alert("Link toh dalo!");

        // Shaka Player setup
        const player = new shaka.Player(video);

        // DRM Configuration (Agar key dali ho toh)
        if (keyId && key) {
            player.configure({
                drm: {
                    clearKeys: {
                        [keyId]: key
                    }
                }
            });
        }

        try {
            await player.load(manifestUri);
            console.log('Video loaded successfully!');
        } catch (e) {
            console.error('Error code', e.code, 'object', e);
            alert("Error: Link invalid hai ya DRM protection hai. Check console.");
        }
    }

    // Shaka support check
    document.addEventListener('DOMContentLoaded', () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            alert('Aapka browser Shaka Player support nahi karta!');
        }
    });
</script>

</body>
</html>
