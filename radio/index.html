<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Sports Player v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #161616; padding: 25px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        video { width: 100%; border-radius: 10px; background: black; margin-top: 15px; border: 1px solid #333; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; }
        .drm-inputs { display: flex; gap: 10px; }
        .drm-inputs input { flex: 1; }
        button { padding: 12px; border-radius: 6px; border: none; background: #ff1744; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #d50000; }
        .status { margin-top: 10px; font-size: 0.85em; color: #00e676; }
    </style>
</head>
<body>

<div class="container">
    <h2>Master Sports Player (HLS/DASH)</h2>
    
    <div class="controls">
        <input type="text" id="urlInput" placeholder="Paste .m3u8 or .mpd link here...">
        <div class="drm-inputs">
            <input type="text" id="keyId" placeholder="Key ID (Only for MPD)">
            <input type="text" id="key" placeholder="Key (Only for MPD)">
        </div>
        <button onclick="startPlayer()">Play Stream</button>
    </div>

    <video id="video" controls autoplay></video>
    <div id="status" class="status">Ready to Play</div>
</div>

<script>
    let currentShakaPlayer = null;

    async function startPlayer() {
        const url = document.getElementById('urlInput').value.trim();
        const keyId = document.getElementById('keyId').value.trim();
        const key = document.getElementById('key').value.trim();
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        if (!url) return alert("Link toh dalo bhai!");

        // Purana Shaka player instance clear karo agar hai toh
        if (currentShakaPlayer) {
            await currentShakaPlayer.destroy();
            currentShakaPlayer = null;
        }

        // --- CASE 1: M3U8 (HLS) ---
        if (url.includes('.m3u8')) {
            status.innerText = "Loading HLS (.m3u8)...";
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        } 
        
        // --- CASE 2: MPD (DASH) ---
        else if (url.includes('.mpd')) {
            status.innerText = "Loading DASH (.mpd) with Shaka...";
            shaka.polyfill.installAll();
            const player = new shaka.Player(video);
            currentShakaPlayer = player;

            // DRM Config
            if (keyId && key) {
                player.configure({
                    drm: { clearKeys: { [keyId]: key } }
                });
            }

            try {
                await player.load(url);
                video.play();
            } catch (e) {
                console.error("DASH Error", e);
                status.innerText = "DASH Error: " + e.code;
            }
        } else {
            alert("Invalid Format! .m3u8 ya .mpd link use karein.");
        }
    }
</script>

</body>
</html>
