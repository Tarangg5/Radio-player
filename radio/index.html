<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Player 4K Ready</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: white; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 12px; }
        video { width: 100%; border-radius: 8px; background: black; margin-top: 15px; border: 1px solid #444; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; }
        button { padding: 12px; border-radius: 5px; border: none; background: #e91e63; color: white; font-weight: bold; cursor: pointer; }
        .quality-box { margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>4K Live Sports Player</h2>
    <div class="controls">
        <input type="text" id="urlInput" placeholder="Paste 4K .m3u8 or .mpd link...">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="keyId" style="flex:1" placeholder="DRM Key ID">
            <input type="text" id="key" style="flex:1" placeholder="DRM Key">
        </div>
        <select id="qualitySelect" onchange="changeQuality()">
            <option value="auto">Auto Quality (4K Ready)</option>
        </select>
        <button onclick="startPlayer()">Play Stream</button>
    </div>
    <video id="video" controls autoplay playsinline></video>
</div>

<script>
    let shakaPlayer = null;
    let hlsInstance = null;

    async function startPlayer() {
        const url = document.getElementById('urlInput').value.trim();
        const video = document.getElementById('video');
        const qSelect = document.getElementById('qualitySelect');

        // Reset previous instances
        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        qSelect.innerHTML = '<option value="auto">Auto Quality</option>';

        if (url.includes('.m3u8')) {
            // HLS 4K Optimization
            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true, // Performance boost
                    capLevelToPlayerSize: false, // 4K force allow
                    maxBufferLength: 30
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    hlsInstance.levels.forEach((l, i) => {
                        let opt = document.createElement('option');
                        opt.value = i;
                        opt.text = l.height + 'p' + (l.height >= 2160 ? ' (4K)' : '');
                        qSelect.appendChild(opt);
                    });
                    video.play();
                });
            }
        } 
        else if (url.includes('.mpd')) {
            // DASH 4K Optimization
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            
            // Allow 4K/UHD
            shakaPlayer.configure({
                restrictions: { minHeight: 0, maxHeight: 4320 },
                abr: { enabled: true }
            });

            const kId = document.getElementById('keyId').value.trim();
            const k = document.getElementById('key').value.trim();
            if (kId && k) {
                shakaPlayer.configure({ drm: { clearKeys: { [kId]: k } } });
            }

            try {
                await shakaPlayer.load(url);
                let tracks = shakaPlayer.getVariantTracks();
                tracks.forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t.id;
                    opt.text = t.height + 'p' + (t.height >= 2160 ? ' (4K)' : '');
                    qSelect.appendChild(opt);
                });
            } catch (e) { alert("Error: " + e.code); }
        }
    }

    function changeQuality() {
        let val = document.getElementById('qualitySelect').value;
        if (hlsInstance) {
            hlsInstance.currentLevel = (val === "auto") ? -1 : parseInt(val);
        } else if (shakaPlayer) {
            if (val === "auto") {
                shakaPlayer.configure({ abr: { enabled: true } });
            } else {
                shakaPlayer.configure({ abr: { enabled: false } });
                let t = shakaPlayer.getVariantTracks().find(x => x.id == val);
                shakaPlayer.selectVariantTrack(t, true);
            }
        }
    }
</script>
</body>
</html>
