<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Player Pro - Audio Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: auto; background: #161616; padding: 25px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        video { width: 100%; border-radius: 10px; background: black; margin-top: 15px; border: 1px solid #333; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; }
        .selector-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .selector-item { display: flex; flex-direction: column; text-align: left; flex: 1; min-width: 150px; }
        label { font-size: 0.8em; margin-bottom: 5px; color: #aaa; }
        button { padding: 15px; border-radius: 6px; border: none; background: #ff1744; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #d50000; }
        .status { margin-top: 10px; font-size: 0.85em; color: #00e676; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Audio & 4K Player</h2>
    
    <div class="controls">
        <input type="text" id="urlInput" placeholder="Paste .m3u8 or .mpd link here...">
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="keyId" style="flex:1" placeholder="DRM Key ID">
            <input type="text" id="key" style="flex:1" placeholder="DRM Key">
        </div>

        <div class="selector-group">
            <div class="selector-item">
                <label>Video Quality:</label>
                <select id="qualitySelect" onchange="changeQuality()">
                    <option value="auto">Auto Quality</option>
                </select>
            </div>
            <div class="selector-item">
                <label>Audio Language:</label>
                <select id="audioSelect" onchange="changeAudio()">
                    <option value="default">Default Audio</option>
                </select>
            </div>
        </div>

        <button onclick="startPlayer()">PLAY STREAM</button>
    </div>

    <video id="video" controls autoplay playsinline></video>
    <div id="status" class="status">Ready to Play</div>
</div>

<script>
    let shakaPlayer = null;
    let hlsInstance = null;
    const video = document.getElementById('video');
    const qSelect = document.getElementById('qualitySelect');
    const aSelect = document.getElementById('audioSelect');

    async function startPlayer() {
        const url = document.getElementById('urlInput').value.trim();
        const kId = document.getElementById('keyId').value.trim();
        const k = document.getElementById('key').value.trim();
        
        // Reset Everything
        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        qSelect.innerHTML = '<option value="auto">Auto Quality</option>';
        aSelect.innerHTML = '<option value="default">Default Audio</option>';

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls({ enableWorker: true, capLevelToPlayerSize: false });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    // Load Qualities
                    hlsInstance.levels.forEach((l, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; opt.text = l.height + 'p';
                        qSelect.appendChild(opt);
                    });
                    video.play();
                });

                // HLS Audio Fix
                hlsInstance.on(Hls.Events.AUDIO_TRACKS_UPDATED, (event, data) => {
                    aSelect.innerHTML = '<option value="default">Default Audio</option>';
                    data.audioTracks.forEach((track, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; 
                        opt.text = track.name || track.lang || `Track ${i+1}`;
                        aSelect.appendChild(opt);
                    });
                });
            }
        } 
        else if (url.includes('.mpd')) {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            shakaPlayer.configure({ restrictions: { maxHeight: 4320 } });

            if (kId && k) {
                shakaPlayer.configure({ drm: { clearKeys: { [kId]: k } } });
            }

            try {
                await shakaPlayer.load(url);
                // Load Qualities
                shakaPlayer.getVariantTracks().forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t.id; opt.text = t.height + 'p';
                    qSelect.appendChild(opt);
                });

                // MPD Audio Fix
                const languages = shakaPlayer.getAudioLanguages();
                if (languages.length > 0) {
                    aSelect.innerHTML = ''; // Clear default
                    languages.forEach(lang => {
                        let opt = document.createElement('option');
                        opt.value = lang;
                        // Beautiful Naming
                        let name = lang.toUpperCase();
                        if(name === 'HI') name = 'HINDI';
                        if(name === 'EN') name = 'ENGLISH';
                        opt.text = name;
                        aSelect.appendChild(opt);
                    });
                }
                video.play();
            } catch (e) { alert("DASH Error: " + e.code); }
        }
    }

    function changeQuality() {
        let val = qSelect.value;
        if (hlsInstance) hlsInstance.currentLevel = (val === "auto") ? -1 : parseInt(val);
        else if (shakaPlayer) {
            if (val === "auto") shakaPlayer.configure({ abr: { enabled: true } });
            else {
                shakaPlayer.configure({ abr: { enabled: false } });
                let t = shakaPlayer.getVariantTracks().find(x => x.id == val);
                shakaPlayer.selectVariantTrack(t, true);
            }
        }
    }

    function changeAudio() {
        let val = aSelect.value;
        if (hlsInstance) hlsInstance.audioTrack = parseInt(val);
        else if (shakaPlayer) shakaPlayer.selectAudioLanguage(val);
    }
</script>

</body>
</html>
