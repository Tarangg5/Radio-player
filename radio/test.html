<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Radio - Live Info</title>
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    .player-container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #222; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
    
    .now-playing-box { margin: 20px 0; background: #000; padding: 20px; border-radius: 15px; border: 1px solid #333; min-height: 90px; }
    #songTitle { font-weight: bold; font-size: 18px; color: var(--primary); display: block; margin-bottom: 5px; }
    #artistName { font-size: 14px; color: #888; font-style: italic; display: block; }
    
    audio { width: 100%; margin-top: 10px; filter: invert(1); }
    .playlist { list-style: none; padding: 0; text-align: left; max-height: 200px; overflow-y: auto; margin-top: 20px; }
    .playlist li { padding: 12px; margin-bottom: 8px; background: #1a1a1a; cursor: pointer; border-radius: 10px; font-size: 14px; border: 1px solid transparent; transition: 0.3s; }
    .playlist li.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); color: var(--primary); }
  </style>
</head>
<body>

  <div class="player-container">
    <h1 style="font-size: 18px; color: var(--primary); letter-spacing: 2px;">SONU RADIO</h1>
    
    <div class="now-playing-box">
      <div id="songTitle">Ready to Play</div>
      <div id="artistName">Artist Name</div>
    </div>

    <audio id="audioPlayer" controls autoplay></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const songDisplay = document.getElementById('songTitle');
    const artistDisplay = document.getElementById('artistName');
    const playlist = document.getElementById('playlist');

    const stations = [
      { name: 'Hindi Melody', id: 'f25zvfe37p8uv', src: 'https://stream.zeno.fm/f25zvfe37p8uv' },
      { name: 'Big FM 92.7', id: 'dbstwo3dvhhtv', src: 'https://stream.zeno.fm/dbstwo3dvhhtv' },
      { name: 'Arijit Singh Hits', id: 'wn6muavgfr2tv', src: 'https://stream.zeno.fm/wn6muavgfr2tv' }
    ];

    let metaUpdater;

    // Zeno metadata nikalne ka sabse mazboot tareeka
    async function getZenoMeta(station) {
        const proxy = "https://api.allorigins.win/get?url=";
        const metaUrl = `https://api.zeno.fm/mounts/metadata/subscribe/${station.id}`;

        try {
            const response = await fetch(proxy + encodeURIComponent(metaUrl));
            const data = await response.json();
            const contents = data.contents;

            // Zeno format parse karna (Singer - Song)
            const titleMatch = contents.match(/"streamTitle":"(.*?)"/);
            if (titleMatch && titleMatch[1]) {
                const fullInfo = titleMatch[1];
                if (fullInfo.includes(" - ")) {
                    const parts = fullInfo.split(" - ");
                    artistDisplay.textContent = parts[0].trim(); // Singer Name
                    songDisplay.textContent = parts[1].trim();   // Song Name
                } else {
                    songDisplay.textContent = fullInfo;
                    artistDisplay.textContent = station.name;
                }
            }
        } catch (e) {
            console.log("Metadata error");
            songDisplay.textContent = station.name;
            artistDisplay.textContent = "Live Radio";
        }
    }

    stations.forEach(st => {
      const li = document.createElement('li');
      li.textContent = st.name;
      li.onclick = () => {
        clearInterval(metaUpdater);
        audioPlayer.src = st.src;
        audioPlayer.play();
        
        // UI update and fetch
        songDisplay.textContent = "Connecting...";
        artistDisplay.textContent = "...";
        getZenoMeta(st);
        
        // Har 15 second mein gane ka naam refresh karein
        metaUpdater = setInterval(() => getZenoMeta(st), 15000);
        
        document.querySelectorAll('li').forEach(item => item.classList.remove('active'));
        li.classList.add('active');
      };
      playlist.appendChild(li);
    });
  </script>
</body>
</html>
