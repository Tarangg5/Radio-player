<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Radio - Live Metadata</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    
    .player-container { width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); text-align: center; }
    
    .header h1 { margin: 0; font-size: 20px; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; }
    
    .now-playing-box { margin: 20px 0; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
    #songTitle { font-weight: bold; font-size: 18px; color: var(--primary); margin-bottom: 5px; }
    #singerTitle { font-size: 14px; color: #888; font-style: italic; }
    
    audio { width: 100%; margin-bottom: 20px; filter: invert(1); }
    
    .playlist { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; text-align: left; }
    .playlist li { background: rgba(255,255,255,0.02); margin-bottom: 8px; padding: 12px; cursor: pointer; border-radius: 10px; font-size: 14px; color: #aaa; transition: 0.3s; border: 1px solid transparent; }
    .playlist li.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border-color: var(--primary); }
    .playlist li:hover { background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="header">
        <h1>SONU RADIO</h1>
        <div class="now-playing-box">
            <div style="font-size: 10px; color: #555; margin-bottom: 8px; letter-spacing: 1px;">NOW STREAMING</div>
            <div id="songTitle">Select a Station</div>
            <div id="singerTitle">Artist Info</div>
        </div>
    </div>
    
    <audio id="audioPlayer" controls autoplay></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const songText = document.getElementById('songTitle');
    const singerText = document.getElementById('singerTitle');
    const playlist = document.getElementById('playlist');

    const audioFiles = [
      { name: 'Hindi Melody', src: 'https://stream.zeno.fm/f25zvfe37p8uv', id: 'f25zvfe37p8uv' },
      { name: 'Arijit Singh Hits', src: 'https://stream.zeno.fm/wn6muavgfr2tv', id: 'wn6muavgfr2tv' },
      { name: 'Big FM 92.7', src: 'https://stream.zeno.fm/dbstwo3dvhhtv', id: 'dbstwo3dvhhtv' },
      { name: 'Md Rafi Hits', src: 'https://stream.zeno.fm/2xx62x8ztm0uv', id: '2xx62x8ztm0uv' }
    ];

    let hls;
    let metaInterval;

    async function updateMetadata(station) {
      if (!station.id) return;

      try {
        // Vercel friendly proxy
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent('https://api.zeno.fm/mounts/metadata/subscribe/' + station.id)}`;
        
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        if (data.streamTitle) {
          const fullTitle = data.streamTitle;
          if (fullTitle.includes(" - ")) {
            const parts = fullTitle.split(" - ");
            singerText.textContent = parts[0].trim();
            songText.textContent = parts[1].trim();
          } else {
            songText.textContent = fullTitle;
            singerText.textContent = station.name;
          }
        }
      } catch (e) {
        console.log("Metadata Fetch Failed");
        // Don't change text to error, keep it clean
      }
    }

    function loadStation(ch, li) {
      if (hls) { hls.destroy(); hls = null; }
      clearInterval(metaInterval);
      
      audioPlayer.src = ch.src;
      audioPlayer.play();
      
      songText.textContent = "Loading Info...";
      singerText.textContent = ch.name;

      // Initial Fetch
      updateMetadata(ch);
      
      // Refresh every 15 seconds
      metaInterval = setInterval(() => updateMetadata(ch), 15000);

      document.querySelectorAll('.playlist li').forEach(item => item.classList.remove('active'));
      li.classList.add('active');
    }

    audioFiles.forEach(ch => {
      const li = document.createElement('li');
      li.textContent = ch.name;
      li.onclick = () => loadStation(ch, li);
      playlist.appendChild(li);
    });
  </script>
</body>
</html>
