<!DOCTYPE html>
<html lang="en">
<head>
  </head>
<body>
  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const nowPlayingText = document.getElementById('nowPlaying');
    const playlist = document.getElementById('playlist');

    // --- Yahan aapko manually details bharni hain ---
    const audioFiles = [
      { 
        name: 'Arijit Singh Hits', 
        src: 'https://stream.zeno.fm/wn6muavgfr2tv',
        // Is station ke liye metadata nikalne ki direct link yahan dalein
        metadataUrl: 'https://api.zeno.fm/mounts/metadata/subscribe/wn6muavgfr2tv' 
      },
      { 
        name: 'Big FM 92.7', 
        src: 'https://stream.zeno.fm/dbstwo3dvhhtv',
        metadataUrl: 'https://api.zeno.fm/mounts/metadata/subscribe/dbstwo3dvhhtv'
      },
      { 
        name: 'Vivid Bharati', 
        src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio001/chunklist.m3u8',
        metadataUrl: '' // Agar metadata nahi hai toh khali chhodein
      }
    ];

    let metadataInterval;

    // Manual Fetching Function
    async function updateManualMetadata(url, defaultName) {
      if (!url) {
        nowPlayingText.textContent = defaultName;
        return;
      }

      try {
        const response = await fetch(url);
        const text = await response.text();
        
        // Zeno format parse karne ke liye simple logic
        if (text.includes('streamTitle')) {
            const match = text.match(/"streamTitle":"(.*?)"/);
            if (match && match[1]) {
                nowPlayingText.textContent = match[1];
            }
        } else {
            nowPlayingText.textContent = defaultName;
        }
      } catch (e) {
        nowPlayingText.textContent = defaultName;
      }
    }

    function loadAudio(ch, listItem) {
      clearInterval(metadataInterval);
      audioPlayer.src = ch.src;
      audioPlayer.play();

      // Pehli baar aur fir har 15 second mein manually update
      updateManualMetadata(ch.metadataUrl, ch.name);
      metadataInterval = setInterval(() => {
        updateManualMetadata(ch.metadataUrl, ch.name);
      }, 15000);

      document.querySelectorAll('.playlist li').forEach(item => item.classList.remove('active'));
      listItem.classList.add('active');
    }

    function renderPlaylist(list) {
      playlist.innerHTML = '';
      list.forEach(ch => {
        const li = document.createElement('li');
        li.textContent = ch.name;
        li.onclick = () => loadAudio(ch, li);
        playlist.appendChild(li);
      });
    }

    renderPlaylist(audioFiles);
  </script>
</body>
</html>
