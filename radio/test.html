<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU Neon Pro - Final Clean</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #050505; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: rgba(20, 20, 20, 0.95); padding: 25px; border-radius: 15px; border: 2px solid #ff0055; box-shadow: 0 0 25px rgba(255, 0, 85, 0.4); }
        h2 { font-size: 1.8em; text-align: center; margin-bottom: 20px; color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        .shaka-video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; height: 100%; }
        .controls-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ff0055; background: #111; color: #fff; font-family: 'Orbitron'; outline: none; }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }
        button { padding: 15px; border-radius: 8px; background: #ff0055; color: #fff; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; font-family: 'Orbitron'; text-transform: uppercase; }
        button:hover { background: #ff0080; transform: scale(1.02); box-shadow: 0 0 20px #ff0055; }
        #status { text-align: center; margin-top: 15px; font-size: 0.8em; color: #00f2fe; }
    </style>
</head>
<body>

<div class="container">
    <h2>SONU NEON PRO</h2>
    <div class="shaka-video-container" id="videoContainer" data-shaka-player-container>
        <video id="video" autoplay playsinline data-shaka-player></video>
    </div>
    <div id="status">SYSTEM ONLINE</div>
    <div class="controls-grid">
        <input type="text" id="urlInput" placeholder="Paste .mpd or .m3u8 link...">
        <input type="text" id="drmKeyInput" placeholder="DRM Key (KID:KEY)">
        <input type="text" id="cookieInput" placeholder="Optional: Paste __hdnea__ cookie here...">
        <div class="row">
            <select id="qualitySelect"><option value="auto">AUTO QUALITY</option></select>
            <select id="audioSelect"><option value="default">DEFAULT AUDIO</option></select>
        </div>
        <button id="playBtn">LAUNCH BYPASS STREAM</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const container = document.getElementById('videoContainer');
    const status = document.getElementById('status');
    const qSelect = document.getElementById('qualitySelect');
    const aSelect = document.getElementById('audioSelect');
    let player = null;
    let ui = null;
    const PROXY = "https://testtvjio.sonuujamuicamp.workers.dev/?url="; 

    async function initApp() {
        shaka.polyfill.installAll();
        player = new shaka.Player(video);
        ui = new shaka.ui.Overlay(player, container, video);

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['Referer'] = 'https://www.jiotv.com/';
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            const cookieValue = document.getElementById('cookieInput').value.trim();
            if (cookieValue) {
                request.headers['Cookie'] = cookieValue;
                if (!request.uris[0].includes('__hdnea__=')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + cookieValue;
                }
            }
        });
    }

    async function startStream() {
        const rawUrl = document.getElementById('urlInput').value.trim();
        const drmInput = document.getElementById('drmKeyInput').value.trim();
        if (!rawUrl) { status.innerText = "PASTE LINK FIRST!"; return; }
        status.innerText = "BYPASSING SERVER...";
        if (drmInput.includes(':')) {
            const [kid, key] = drmInput.split(':');
            player.configure({ drm: { clearKeys: { [kid.trim()]: key.trim() } } });
        }
        try {
            const finalUrl = PROXY + encodeURIComponent(rawUrl);
            await player.load(finalUrl);
            status.innerText = "STREAM ACTIVE";
            updateSelectors();
        } catch (e) { status.innerText = "LOAD FAILED: " + e.code; }
    }

    function updateSelectors() {
        const tracks = player.getVariantTracks();
        qSelect.innerHTML = '<option value="auto">AUTO QUALITY</option>';
        tracks.forEach(t => {
            let opt = document.createElement('option');
            opt.value = t.id;
            opt.text = t.height + 'p (' + Math.round(t.bandwidth/1000) + 'kbps)';
            qSelect.appendChild(opt);
        });
        const langs = player.getAudioLanguages();
        aSelect.innerHTML = '<option value="default">DEFAULT AUDIO</option>';
        langs.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l;
            opt.text = l.toUpperCase();
            aSelect.appendChild(opt);
        });
    }

    qSelect.onchange = () => {
        if (qSelect.value === "auto") player.configure({ abr: { enabled: true } });
        else {
            player.configure({ abr: { enabled: false } });
            player.selectVariantTrack(player.getVariantTracks().find(t => t.id == qSelect.value), true);
        }
    };
    aSelect.onchange = () => player.selectAudioLanguage(aSelect.value);
    document.getElementById('playBtn').addEventListener('click', startStream);
    document.addEventListener('shaka-ui-loaded', initApp);
</script>
</body>
</html>
