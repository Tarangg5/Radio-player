<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON ULTIMATE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        
        body { margin: 0; background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 850px; background: #111; border: 2px solid #ff0055; border-radius: 15px; padding: 15px; box-shadow: 0 0 30px rgba(255, 0, 85, 0.3); }
        
        .video-shell { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; }

        .input-area { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 100px; background: #000; color: #00f2fe; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; outline: none; resize: none; }
        
        button { background: #ff0055; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ff0077; box-shadow: 0 0 15px #ff0055; }
        
        #status { margin-top: 10px; text-align: center; font-size: 0.8em; color: #aaa; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h2 style="text-align: center; color: #ff0055; margin-top: 0;">SONU NEON LIVE</h2>
        
        <div class="video-shell" id="videoParent" data-shaka-player-container>
            <video id="mainVideo" autoplay playsinline data-shaka-player></video>
            <div class="play-overlay" id="forcePlay">▶ CLICK TO START</div>
        </div>

        <div id="status">READY: PASTE FULL LINK AND HIT LOAD</div>

        <div class="input-area">
            <textarea id="rawInput" placeholder="Paste your link with |Cookie|User-Agent|drmLicense here..."></textarea>
            <button onclick="processLink()">LOAD STREAM</button>
        </div>
    </div>

<script>
    let player, ui;
    const video = document.getElementById('mainVideo');
    const status = document.getElementById('status');
    const overlay = document.getElementById('forcePlay');
    
    // Cloudflare Worker Proxy
    const PROXY = "https://testtvjio.sonuujamuicamp.workers.dev/?url=";

    async function init() {
        shaka.polyfill.installAll();
        player = new shaka.Player(video);
        ui = new shaka.ui.Overlay(player, document.getElementById('videoParent'), video);

        // Network filters for bypass
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            const data = parseInput();
            if(!data.url) return;

            request.headers['Referer'] = 'https://jiotv.com/';
            request.headers['User-Agent'] = data.ua || 'plaYtv/7.1.3 (Linux;Android 13) ExoPlayerLib/824.0';
            
            if (data.cookie) {
                request.headers['Cookie'] = data.cookie;
                // Append cookie to segment URLs if needed
                if (!request.uris[0].includes('__hdnea__=')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + data.cookie;
                }
            }
        });
    }

    function parseInput() {
        const input = document.getElementById('rawInput').value.trim();
        const parts = input.split('|');
        let obj = { url: parts[0], cookie: "", ua: "", drm: "" };

        parts.forEach(p => {
            let lower = p.toLowerCase();
            if (lower.startsWith("cookie=")) obj.cookie = p.split('=')[1];
            if (lower.startsWith("user-agent=")) obj.ua = p.split('=')[1];
            if (lower.startsWith("drmlicense=")) obj.drm = p.split('=')[1];
        });
        return obj;
    }

    async function processLink() {
        const data = parseInput();
        if (!data.url) { status.innerText = "ERROR: LINK KHali HAI"; return; }

        status.innerText = "DECODING STREAM...";
        overlay.style.display = "none";

        // DRM Clearkey Config
        if (data.drm && data.drm.includes(':')) {
            const [kid, key] = data.drm.split(':');
            player.configure({
                drm: { clearKeys: { [kid.trim()]: key.trim() } }
            });
        }

        try {
            const finalUrl = PROXY + encodeURIComponent(data.url);
            await player.load(finalUrl);
            status.innerText = "ONLINE: STREAMING STARTED";
            
            // Autoplay attempt
            video.play().catch(() => {
                overlay.style.display = "flex";
            });
        } catch (e) {
            status.innerText = "LOAD FAILED: Error " + e.code;
            console.error(e);
        }
    }

    overlay.onclick = () => {
        video.play();
        overlay.style.display = "none";
    };

    document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
