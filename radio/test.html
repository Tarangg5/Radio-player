<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU Neon Pro - Verified Clean</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 2px solid #ff0055; box-shadow: 0 0 20px #ff0055; }
        .shaka-video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 10px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .controls-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ff0055; background: #111; color: #fff; font-family: 'Orbitron'; outline: none; }
        button { background: #ff0055; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #status { text-align: center; margin: 10px 0; font-size: 0.8em; color: #00f2fe; }
        #manualPlayBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ff0055; color: white; padding: 15px 25px; border-radius: 8px; cursor: pointer; z-index: 2000; display: none; border: none; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#ff0055; text-align:center;">SONU NEON PRO</h2>
    <div class="shaka-video-container" id="videoContainer" data-shaka-player-container>
        <video id="video" autoplay playsinline data-shaka-player></video>
        <button id="manualPlayBtn">▶ CLICK TO PLAY</button>
    </div>
    <div id="status">READY</div>
    <div class="controls-grid">
        <input type="text" id="urlInput" placeholder="Paste .mpd link here...">
        <input type="text" id="drmKeyInput" placeholder="DRM Key (KID:KEY)">
        <button id="playBtn">LAUNCH BYPASS STREAM</button>
    </div>
</div>

<script>
    let player, ui;
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const manualBtn = document.getElementById('manualPlayBtn');
    const PROXY = "https://testtvjio.sonuujamuicamp.workers.dev/?url=";

    async function initApp() {
        shaka.polyfill.installAll();
        player = new shaka.Player(video);
        const container = document.getElementById('videoContainer');
        ui = new shaka.ui.Overlay(player, container, video);

        [span_2](start_span)// Advanced Buffering Config[span_2](end_span)
        player.configure({
            streaming: {
                lowLatencyMode: true,
                bufferingGoal: 15,
                rebufferingGoal: 2,
                bufferBehind: 15
            }
        });

        [span_3](start_span)// Request Filter (JioTV Bypass)[span_3](end_span)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['Referer'] = 'https://www.jiotv.com/';
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        });
    }

    async function startStream() {
        const url = document.getElementById('urlInput').value.trim();
        const drm = document.getElementById('drmKeyInput').value.trim();
        
        if (!url) return;
        status.innerText = "BYPASSING SERVER...";

        if (drm.includes(':')) {
            const parts = drm.split(':');
            player.configure({
                drm: { clearKeys: { [parts[0].trim()]: parts[1].trim() } }
            });
        }

        try {
            const finalUrl = PROXY + encodeURIComponent(url);
            await player.load(finalUrl);
            status.innerText = "LOADED - PRESS PLAY IF NO VIDEO";
            
            [span_4](start_span)// Force Play Attempt[span_4](end_span)
            try {
                await video.play();
            } catch (e) {
                manualBtn.style.display = 'block';
            }
        } catch (e) {
            status.innerText = "ERROR: " + e.code;
        }
    }

    manualBtn.addEventListener('click', () => {
        video.play();
        manualBtn.style.display = 'none';
    });

    document.getElementById('playBtn').addEventListener('click', startStream);
    document.addEventListener('shaka-ui-loaded', initApp);
</script>
</body>
</html>
