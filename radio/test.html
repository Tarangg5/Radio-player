<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Radio - Metadata Fixed</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    .player-container { width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); text-align: center; }
    .header h1 { margin: 0; font-size: 20px; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; }
    
    .now-playing-box { margin: 20px 0; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
    #songTitle { font-weight: bold; font-size: 18px; color: var(--primary); margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,242,255,0.2); }
    #singerTitle { font-size: 14px; color: #888; font-style: italic; }
    
    audio { width: 100%; margin-bottom: 20px; filter: invert(1); }
    .playlist { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; text-align: left; }
    .playlist li { background: rgba(255,255,255,0.02); margin-bottom: 5px; padding: 12px; cursor: pointer; border-radius: 10px; font-size: 14px; color: #aaa; }
    .playlist li.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="header">
        <h1>SONU RADIO</h1>
        <div class="now-playing-box">
            <div style="font-size: 10px; color: #555; margin-bottom: 10px;">LIVE METADATA</div>
            <div id="songTitle">Select a Station</div>
            <div id="singerTitle">Artist Info</div>
        </div>
    </div>
    <audio id="audioPlayer" controls></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const songText = document.getElementById('songTitle');
    const singerText = document.getElementById('singerTitle');
    const playlist = document.getElementById('playlist');

    const audioFiles = [
      { name: 'Arijit Singh Hits', src: 'https://stream.zeno.fm/wn6muavgfr2tv', meta: 'https://api.zeno.fm/mounts/metadata/subscribe/wn6muavgfr2tv' },
      { name: 'Big FM 92.7', src: 'https://stream.zeno.fm/dbstwo3dvhhtv', meta: 'https://api.zeno.fm/mounts/metadata/subscribe/dbstwo3dvhhtv' },
      { name: 'Md Rafi Hits', src: 'https://stream.zeno.fm/2xx62x8ztm0uv', meta: 'https://api.zeno.fm/mounts/metadata/subscribe/2xx62x8ztm0uv' }
    ];

    let metadataInterval;

    async function getLiveMeta(url, station) {
        if (!url) {
            songText.textContent = station;
            singerText.textContent = "Live Stream";
            return;
        }

        try {
            // CORS Bypass Proxy
            const proxy = "https://api.allorigins.win/get?url=";
            const res = await fetch(proxy + encodeURIComponent(url));
            const data = await res.json();
            const rawText = data.contents;

            // Manual String Extract logic for Zeno
            const match = rawText.match(/"streamTitle":"(.*?)"/);
            if (match && match[1]) {
                const fullText = match[1];
                if (fullText.includes(" - ")) {
                    const parts = fullText.split(" - ");
                    singerText.textContent = parts[0].trim(); // Artist Name
                    songText.textContent = parts[1].trim();   // Song Name
                } else {
                    songText.textContent = fullText;
                    singerText.textContent = station;
                }
            }
        } catch (e) {
            songText.textContent = station;
            singerText.textContent = "Radio Live";
        }
    }

    function loadStation(ch, li) {
        clearInterval(metadataInterval);
        audioPlayer.src = ch.src;
        audioPlayer.play();

        songText.textContent = "Connecting...";
        singerText.textContent = "...";

        // Start Metadata Updates
        getLiveMeta(ch.meta, ch.name);
        metadataInterval = setInterval(() => getLiveMeta(ch.meta, ch.name), 15000);

        document.querySelectorAll('.playlist li').forEach(item => item.classList.remove('active'));
        li.classList.add('active');
    }

    audioFiles.forEach(ch => {
        const li = document.createElement('li');
        li.textContent = ch.name;
        li.onclick = () => loadStation(ch, li);
        playlist.appendChild(li);
    });
  </script>
</body>
</html>
