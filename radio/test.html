<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON PRO - FIXED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 2px solid #ff0055; box-shadow: 0 0 20px #ff0055; }
        .shaka-video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 10px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .controls-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid #ff0055; background: #111; color: #00f2fe; font-family: monospace; font-size: 11px; outline: none; box-sizing: border-box; resize: none; }
        button { padding: 15px; border-radius: 8px; background: #ff0055; color: #fff; font-weight: bold; border: none; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase; }
        #status { text-align: center; margin: 10px 0; font-size: 0.8em; color: #00f2fe; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#ff0055; text-align:center;">SONU NEON PRO</h2>
    <div class="shaka-video-container" id="videoContainer" data-shaka-player-container>
        <video id="video" autoplay playsinline data-shaka-player></video>
    </div>
    <div id="status">READY: PASTE FULL URL BELOW</div>
    <div class="controls-grid">
        <textarea id="fullLink" placeholder="Paste link with |Cookie|User-Agent|drmLicense here..."></textarea>
        <button id="playBtn">PROCESS & PLAY STREAM</button>
    </div>
</div>

<script>
    let player, ui;
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const PROXY = "https://testtvjio.sonuujamuicamp.workers.dev/?url=";

    async function initApp() {
        shaka.polyfill.installAll();
        player = new shaka.Player(video);
        const videoContainer = document.getElementById('videoContainer');
        ui = new shaka.ui.Overlay(player, videoContainer, video);
        
        // Error 1001 fix: Request filter initialization
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            const input = document.getElementById('fullLink').value.trim();
            if (!input) return;

            const parts = input.split('|');
            let cookie = "";
            let userAgent = "plaYtv/7.1.3 (Linux;Android 13) ExoPlayerLib/824.0";

            parts.forEach(p => {
                const low = p.toLowerCase();
                if (low.includes("cookie=")) cookie = p.split('=')[1];
                if (low.includes("user-agent=")) userAgent = p.split('=')[1];
            });

            request.headers['Referer'] = 'https://jiotv.com/';
            request.headers['User-Agent'] = userAgent;

            if (cookie) {
                request.headers['Cookie'] = cookie;
                if (!request.uris[0].includes('__hdnea__=')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + cookie;
                }
            }
        });

        player.configure({
            streaming: { lowLatencyMode: true, bufferingGoal: 15, rebufferingGoal: 2 }
        });
    }

    async function startStream() {
        const input = document.getElementById('fullLink').value.trim();
        if (!input) return;
        status.innerText = "BYPASSING ERROR 1001...";
        
        const parts = input.split('|');
        const mainUrl = parts[0];
        let drmKey = "";

        parts.forEach(p => {
            const low = p.toLowerCase();
            if (low.includes("drmlicense=")) drmKey = p.split('=')[1];
        });

        if (drmKey && drmKey.includes(':')) {
            const drmParts = drmKey.split(':');
            player.configure({
                drm: { clearKeys: { [drmParts[0].trim()]: drmParts[1].trim() } }
            });
        }

        try {
            const finalUrl = PROXY + encodeURIComponent(mainUrl);
            await player.load(finalUrl);
            status.innerText = "STREAMING NOW";
            video.play();
        } catch (e) {
            status.innerText = "FAILED ERROR: " + e.code;
        }
    }

    document.getElementById('playBtn').addEventListener('click', startStream);
    document.addEventListener('shaka-ui-loaded', initApp);
</script>
</body>
</html>
