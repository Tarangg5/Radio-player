<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Radio - Manual Metadata</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    .player-container { width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); text-align: center; }
    .header h1 { margin: 0; font-size: 20px; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; }
    .now-playing-box { margin: 20px 0; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    #nowPlaying { font-weight: bold; font-size: 16px; color: var(--primary); text-shadow: 0 0 10px rgba(0,242,255,0.3); }
    audio { width: 100%; margin-bottom: 20px; filter: invert(1); }
    .playlist { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; text-align: left; }
    .playlist li { background: rgba(255,255,255,0.02); margin-bottom: 5px; padding: 12px; cursor: pointer; border-radius: 10px; font-size: 14px; color: #aaa; border: 1px solid transparent; }
    .playlist li.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border-color: var(--primary); }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="header">
        <h1>SONU RADIO</h1>
        <div class="now-playing-box">
            <div style="font-size: 10px; color: #888;">NOW PLAYING</div>
            <div id="nowPlaying">Select a Station</div>
        </div>
    </div>
    
    <audio id="audioPlayer" controls></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const nowPlayingText = document.getElementById('nowPlaying');
    const playlist = document.getElementById('playlist');

    // --- MANUAL DATA: Yahan har station ki metadata link khud dalein ---
    const audioFiles = [
      { 
        name: 'Arijit Singh Hits', 
        src: 'https://stream.zeno.fm/wn6muavgfr2tv',
        metadataUrl: 'https://api.zeno.fm/mounts/metadata/subscribe/wn6muavgfr2tv' 
      },
      { 
        name: 'Big FM 92.7', 
        src: 'https://stream.zeno.fm/dbstwo3dvhhtv',
        metadataUrl: 'https://api.zeno.fm/mounts/metadata/subscribe/dbstwo3dvhhtv'
      },
      { 
        name: 'Md Rafi Hits', 
        src: 'https://stream.zeno.fm/2xx62x8ztm0uv',
        metadataUrl: 'https://api.zeno.fm/mounts/metadata/subscribe/2xx62x8ztm0uv'
      }
    ];

    let hls;
    let metadataInterval;

    async function updateMetadata(url, defaultName) {
      if (!url) {
        nowPlayingText.textContent = defaultName;
        return;
      }
      try {
        // Zeno metadata parse karne ka manual tareeka
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        const json = await response.json();
        const raw = json.contents;
        const match = raw.match(/"streamTitle":"(.*?)"/);
        nowPlayingText.textContent = match ? match[1] : defaultName;
      } catch (e) {
        nowPlayingText.textContent = defaultName;
      }
    }

    function loadAudio(ch, li) {
      if (hls) { hls.destroy(); hls = null; }
      clearInterval(metadataInterval);
      
      nowPlayingText.textContent = "Connecting...";
      
      if (ch.src.endsWith('.m3u8') && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(ch.src);
        hls.attachMedia(audioPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, () => audioPlayer.play());
      } else {
        audioPlayer.src = ch.src;
        audioPlayer.play();
      }

      // Metadata update start
      updateMetadata(ch.metadataUrl, ch.name);
      metadataInterval = setInterval(() => updateMetadata(ch.metadataUrl, ch.name), 20000);

      document.querySelectorAll('.playlist li').forEach(item => item.classList.remove('active'));
      li.classList.add('active');
    }

    function renderPlaylist() {
      audioFiles.forEach(ch => {
        const li = document.createElement('li');
        li.textContent = ch.name;
        li.onclick = () => loadAudio(ch, li);
        playlist.appendChild(li);
      });
    }

    renderPlaylist();
  </script>
</body>
</html>
