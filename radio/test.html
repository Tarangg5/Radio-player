<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Radio - Finfal Fix</title>
  <style>
    :root { --primary: #00f2ff; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .player-container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
    .now-playing-box { margin: 20px 0; background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222; min-height: 80px; }
    #songTitle { font-weight: bold; font-size: 18px; color: var(--primary); display: block; }
    #singerTitle { font-size: 14px; color: #888; display: block; margin-top: 5px; }
    audio { width: 100%; margin: 15px 0; filter: invert(1); }
    .playlist { list-style: none; padding: 0; text-align: left; max-height: 200px; overflow-y: auto; }
    .playlist li { padding: 10px; margin-bottom: 5px; background: #1a1a1a; cursor: pointer; border-radius: 8px; font-size: 14px; }
    .playlist li.active { border: 1px solid var(--primary); color: var(--primary); }
  </style>
</head>
<body>

  <div class="player-container">
    <h2 style="font-size: 16px; letter-spacing: 2px;">SONU RADIO</h2>
    <div class="now-playing-box">
      <span id="songTitle">Select Station</span>
      <span id="singerTitle">Artist Info</span>
    </div>
    <audio id="audioPlayer" controls autoplay></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const songText = document.getElementById('songTitle');
    const singerText = document.getElementById('singerTitle');
    const playlist = document.getElementById('playlist');

    const stations = [
      { name: 'Arijit Singh Hits', src: 'https://stream.zeno.fm/wn6muavgfr2tv', id: 'wn6muavgfr2tv' },
      { name: 'Big FM 92.7', src: 'https://stream.zeno.fm/dbstwo3dvhhtv', id: 'dbstwo3dvhhtv' },
      { name: 'Md Rafi Hits', src: 'https://stream.zeno.fm/2xx62x8ztm0uv', id: '2xx62x8ztm0uv' }
    ];

    let metaInterval;

    async function fetchMeta(station) {
        // Zeno direct metadata link
        const url = `https://api.zeno.fm/mounts/metadata/subscribe/${station.id}`;
        
        try {
            // Using a more reliable open proxy
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const raw = data.contents;
            
            // Look for song title in the raw text
            const parts = raw.split('"streamTitle":"');
            if (parts.length > 1) {
                const title = parts[1].split('"')[0];
                if (title.includes(" - ")) {
                    const [singer, song] = title.split(" - ");
                    singerText.textContent = singer.trim();
                    songText.textContent = song.trim();
                } else {
                    songText.textContent = title;
                    singerText.textContent = station.name;
                }
            }
        } catch (e) {
            songText.textContent = station.name;
            singerText.textContent = "Live Stream";
        }
    }

    stations.forEach(st => {
      const li = document.createElement('li');
      li.textContent = st.name;
      li.onclick = () => {
        clearInterval(metaInterval);
        audioPlayer.src = st.src;
        audioPlayer.play();
        
        // Initial fetch
        fetchMeta(st);
        // Refresh every 20 seconds
        metaInterval = setInterval(() => fetchMeta(st), 20000);
        
        document.querySelectorAll('li').forEach(l => l.classList.remove('active'));
        li.classList.add('active');
      };
      playlist.appendChild(li);
    });
  </script>
</body>
</html>
