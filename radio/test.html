<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Radio - Official Metadata</title>
  <style>
    :root { --primary: #00f2ff; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .player-container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
    
    /* Official Zeno Style Metadata Box */
    .zeno-meta { margin: 20px 0; background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222; min-height: 80px; }
    #track-title { font-weight: bold; font-size: 18px; color: var(--primary); display: block; }
    #artist-name { font-size: 14px; color: #888; display: block; margin-top: 5px; }
    
    audio { width: 100%; margin: 15px 0; filter: invert(1); }
    .playlist { list-style: none; padding: 0; text-align: left; max-height: 200px; overflow-y: auto; }
    .playlist li { padding: 12px; margin-bottom: 8px; background: #1a1a1a; cursor: pointer; border-radius: 10px; font-size: 14px; border: 1px solid transparent; }
    .playlist li.active { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>

  <div class="player-container">
    <h2 style="font-size: 12px; color: #555; letter-spacing: 2px;">SONU RADIO OFFICIAL</h2>
    
    <div class="zeno-meta">
      <span id="track-title">Select Station</span>
      <span id="artist-name">Artist Info</span>
    </div>

    <audio id="audioPlayer" controls autoplay></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script src="https://zeno.fm/static/js/widget.js"></script>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const songText = document.getElementById('track-title');
    const artistText = document.getElementById('artist-name');
    const playlist = document.getElementById('playlist');

    const stations = [
      { name: 'Hindi Melody', id: 'f25zvfe37p8uv', src: 'https://stream.zeno.fm/f25zvfe37p8uv' },
      { name: 'Arijit Singh Hits', id: 'wn6muavgfr2tv', src: 'https://stream.zeno.fm/wn6muavgfr2tv' },
      { name: 'Md Rafi Hits', id: '2xx62x8ztm0uv', src: 'https://stream.zeno.fm/2xx62x8ztm0uv' }
    ];

    // Function to fetch metadata using Zeno's official widget endpoint
    function updateOfficialMeta(stationId) {
        // Zeno uses a public JSONP-like endpoint for their widgets
        fetch(`https://api.zeno.fm/mounts/metadata/subscribe/${stationId}`)
            .then(response => response.json())
            .then(data => {
                if (data.streamTitle) {
                    const title = data.streamTitle;
                    if (title.includes(" - ")) {
                        const parts = title.split(" - ");
                        artistText.textContent = parts[0].trim();
                        songText.textContent = parts[1].trim();
                    } else {
                        songText.textContent = title;
                        artistText.textContent = "Live Radio";
                    }
                }
            })
            .catch(() => {
                // If it fails, we keep the station name
                console.log("Widget API fell back.");
            });
    }

    stations.forEach(st => {
      const li = document.createElement('li');
      li.textContent = st.name;
      li.onclick = () => {
        audioPlayer.src = st.src;
        audioPlayer.play();
        
        // Show station name immediately
        songText.textContent = st.name;
        artistText.textContent = "Loading Info...";

        // Initial fetch
        updateOfficialMeta(st.id);
        
        // Auto-refresh using setInterval
        if(window.metaInterval) clearInterval(window.metaInterval);
        window.metaInterval = setInterval(() => updateOfficialMeta(st.id), 20000);

        document.querySelectorAll('li').forEach(l => l.classList.remove('active'));
        li.classList.add('active');
      };
      playlist.appendChild(li);
    });
  </script>
</body>
</html>
