<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU Neon Sports Player - Jio Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #050505; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #ff0055; box-shadow: 0 0 20px #ff0055; position: relative; }
        .logo-container { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00f2fe; box-shadow: 0 0 15px #00f2fe; overflow: hidden; background: #000; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }
        h2 { font-size: 2.2em; margin-bottom: 20px; text-shadow: 0 0 15px #ff0055; }
        video { width: 100%; border-radius: 12px; margin-top: 20px; border: 3px solid #00f2fe; box-shadow: 0 0 25px #00f2fe; background: #000; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 60px; }
        input, select { padding: 14px; border-radius: 8px; border: 2px solid #ff0055; background: #111; color: #fff; font-family: 'Orbitron'; outline: none; }
        .selector-group { display: flex; gap: 10px; }
        .selector-item { flex: 1; text-align: left; }
        label { font-size: 0.8em; color: #00f2fe; margin-bottom: 5px; display: block; }
        button { padding: 18px; border-radius: 10px; background: transparent; color: #ff0055; font-weight: bold; border: 2px solid #ff0055; box-shadow: 0 0 10px #ff0055; cursor: pointer; transition: 0.4s; font-family: 'Orbitron'; }
        button:hover { background: #ff0055; color: #fff; box-shadow: 0 0 30px #ff0055; }
        #status { margin-top: 15px; color: #00e676; text-shadow: 0 0 5px #00e676; font-size: 0.9em; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSHbTtG3wGQFbFUaChzCmNG2v5bAsK8ESlbw&s" alt="IR"></div>
    <h2>SONU NEON PLAYER</h2>
    <div class="controls">
        <input type="text" id="urlInput" placeholder="Paste .m3u8 or .mpd link here...">
        <input type="text" id="drmKeyInput" placeholder="Paste DRM Key (KID:KEY)">
        <input type="text" id="cookieInput" placeholder="Paste Cookie (__hdnea__=...)">
        
        <div class="selector-group">
            <div class="selector-item">
                <label>QUALITY</label>
                <select id="qualitySelect"><option value="auto">AUTO</option></select>
            </div>
            <div class="selector-item">
                <label>AUDIO</label>
                <select id="audioSelect"><option value="default">DEFAULT</option></select>
            </div>
        </div>
        <button id="playBtn">LAUNCH STREAM</button>
    </div>
    <video id="video" controls autoplay playsinline></video>
    <div id="status">SYSTEM READY...</div>
</div>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const qSelect = document.getElementById('qualitySelect');
    const aSelect = document.getElementById('audioSelect');
    let shakaPlayer = null;
    let hlsInstance = null;

    document.getElementById('playBtn').addEventListener('click', startPlayer);

    async function startPlayer() {
        const url = document.getElementById('urlInput').value.trim();
        const drmInput = document.getElementById('drmKeyInput').value.trim();
        const manualCookie = document.getElementById('cookieInput').value.trim();
        
        status.innerText = "INITIALIZING...";

        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        qSelect.innerHTML = '<option value="auto">AUTO</option>';
        aSelect.innerHTML = '<option value="default">DEFAULT</option>';

        if (!url) { status.innerText = "ERROR: PASTE LINK FIRST"; return; }

        // --- HLS (.m3u8) logic ---
        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true,
                    xhrSetup: function(xhr, url) {
                        xhr.setRequestHeader('User-Agent', 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6');
                        if (manualCookie) {
                            xhr.setRequestHeader('Cookie', manualCookie);
                        }
                    }
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    hlsInstance.levels.forEach((l, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; opt.text = l.height + 'p';
                        qSelect.appendChild(opt);
                    });
                    video.play();
                    status.innerText = "HLS ACTIVE";
                });
            }
        } 
        // --- DASH (.mpd) logic (For JioTV/DRM) ---
        else if (url.includes('.mpd')) {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            
            // JIO HEADERS & COOKIE PERSISTENCE
            shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers["Referer"] = "https://www.jiotv.com/";
                request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

                if (manualCookie) {
                    request.headers["Cookie"] = manualCookie;
                    // Persistence Logic: Append token to segment URIs
                    if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                        if (!request.uris[0].includes("__hdnea__")) {
                            const sep = request.uris[0].includes("?") ? "&" : "?";
                            request.uris[0] += sep + manualCookie;
                        }
                    }
                }
            });

            if (drmInput.includes(':')) {
                const parts = drmInput.split(':');
                shakaPlayer.configure({
                    drm: { clearKeys: { [parts[0].trim()]: parts[1].trim() } },
                    streaming: { abr: { enabled: false } } // Forced High Quality Default
                });
                status.innerText = "DRM LOADED...";
            }

            try {
                await shakaPlayer.load(url);
                
                // Sorting quality (High to Low)
                const tracks = shakaPlayer.getVariantTracks().sort((a, b) => b.height - a.height);
                const seen = new Set();
                
                tracks.forEach(t => {
                    if (!seen.has(t.height)) {
                        let opt = document.createElement('option');
                        opt.value = t.id; opt.text = t.height + 'p';
                        qSelect.appendChild(opt);
                        seen.add(t.height);
                    }
                });

                // Force Best Quality on load
                if (tracks.length > 0) {
                    shakaPlayer.selectVariantTrack(tracks[0], true);
                    qSelect.value = tracks[0].id;
                }

                video.play();
                status.innerText = "DASH ACTIVE";
            } catch (e) { status.innerText = "ERROR: " + e.code; }
        }
    }

    qSelect.onchange = () => {
        if (hlsInstance) hlsInstance.currentLevel = qSelect.value === "auto" ? -1 : parseInt(qSelect.value);
        if (shakaPlayer) {
            if (qSelect.value === "auto") shakaPlayer.configure({ abr: { enabled: true } });
            else {
                shakaPlayer.configure({ abr: { enabled: false } });
                shakaPlayer.selectVariantTrack(shakaPlayer.getVariantTracks().find(t => t.id == qSelect.value), true);
            }
        }
    };
</script>
</body>
</html>
