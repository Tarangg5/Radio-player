    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 5px; }
    .channel-item { background: #151515; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #222; }

    .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.15); box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 5px; background: transparent; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .footer-badge { margin: 30px 0; text-align: center; }

    let player;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      
      // Safety check for plugin
      const usedPlugins = [DashShakaPlayback];
      if (typeof LevelSelector !== 'undefined') {
        usedPlugins.push(LevelSelector);
      }

      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: usedPlugins,
        shakaConfiguration: {
          drm: { clearKeys: key ? { [key.split(':')[0]]: key.split(':')[1] } : {} }
        },
        levelSelectorConfig: {
            title: 'Quality',
            labels: {
                2: '720p', 
                1: '480p', 
                0: '360p',
            },
            labelCallback: function(playbackLevel, customLabel) {
                return customLabel || playbackLevel.level.height + 'p';
            }
        },
        width: '100%', height: '100%', autoPlay: true,
        mimeType: src.endsWith('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL'
      });
      document.title = "Sonu TV: " + name;
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45/111/fff?text=TV'"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
