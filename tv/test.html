<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu 4K Player - Hybrid Support</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.0.1/mux.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
  
  <style>
    :root { --primary: #00f2ff; --bg: #050505; --card: #151515; }
    body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }

    .video-container { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,242,255,0.1); }
    video { width: 100%; height: 100%; }

    .channel-box { width: 100%; max-width: 850px; margin-top: 20px; }
    #searchBar { width: 100%; padding: 14px; border-radius: 10px; background: #1a1a1a; color: white; border: 1px solid #444; outline: none; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }

    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .channel-item { background: var(--card); padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    .channel-item:active { transform: scale(0.95); }
    .channel-item.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; pointer-events: none; }
    .channel-item span { display: block; font-size: 11px; font-weight: bold; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }

    /* UI Coloring */
    .shaka-video-container .shaka-range-element { color: var(--primary) !important; }
    .shaka-settings-menu { background: rgba(20, 20, 20, 0.9) !important; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="video-container" id="video-wrapper" data-shaka-player-container>
    <video id="video" data-shaka-player autoplay></video>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'AAJ TAK HD', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROsvSB70AOq6eVcWxOwV8mArbJ5kIWBH418Q&s' },
      { name: 'NEWS18 HINDI', src: 'https://nw18live.cdn.jio.com/bpk-tv/News18_India_NW18_MOB/output01/News18_India_NW18_MOB-audio_98834_eng=98800-video=2293600.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyjjXoJrm98pN9PWgGodxByoe3Yc8bfIZaNM79xmEGUpJvFm0qPGr4T48&s=10' },
      { name: 'Discovery Science', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Discoveryscience2/default/manifest.mpd', key: '5458f45efedb4d6f8aa6ac76c85b621b:dbf8a0a306a64525ba3012fd225370c0', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/vIA7TExn.png' }
    ];

    let player;
    let ui;

    async function initPlayer() {
      const video = document.getElementById('video');
      const container = document.getElementById('video-wrapper');
      
      player = new shaka.Player(video);
      ui = new shaka.ui.Overlay(player, container, video);

      // HLS Support configuration
      player.configure({
        manifest: {
          retryParameters: { maxAttempts: 5 },
          hls: { ignoreTextStreamFailures: true }
        },
        streaming: {
          bufferingGoal: 15,
          rebufferingGoal: 2
        }
      });
    }

    async function playChannel(src, key, name) {
      const drmConfig = key ? { [key.split(':')[0]]: key.split(':')[1] } : {};
      
      player.configure({
        drm: { clearKeys: drmConfig }
      });

      try {
        await player.load(src);
        console.log('Now playing:', name);
      } catch (e) {
        console.error('Playback Error:', e);
      }
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        
        div.addEventListener('click', () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        });
        
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    document.addEventListener('shaka-ui-loaded', async () => {
      await initPlayer();
      renderChannels(channels);
      if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
    });
  </script>
</body>
</html>
