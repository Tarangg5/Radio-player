<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu 4K Player - Quality & Audio Fixed</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.0.1/mux.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
  
  <style>
    :root { --primary: #00f2ff; --bg: #050505; }
    body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }

    .video-container { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
    video { width: 100%; height: 100%; }

    .channel-box { width: 100%; max-width: 850px; margin-top: 20px; }
    #searchBar { width: 100%; padding: 14px; border-radius: 10px; background: #1a1a1a; color: white; border: 1px solid #444; outline: none; margin-bottom: 15px; box-sizing: border-box; }

    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .channel-item { background: #151515; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    .channel-item.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
    .channel-item span { display: block; font-size: 11px; font-weight: bold; color: #ccc; }

    /* Force Shaka UI to show all settings */
    .shaka-overflow-menu-button { color: white !important; }
    .shaka-settings-menu button { color: white !important; }
  </style>
</head>
<body>

  <div class="video-container" id="video-wrapper" data-shaka-player-container>
    <video id="video" data-shaka-player autoplay></video>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'AAJ TAK HD', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROsvSB70AOq6eVcWxOwV8mArbJ5kIWBH418Q&s' },
      { name: 'TRAVELXP 4K', src: 'https://deltatesttatasky.akamaized.net/out/i/968284.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIHMD2TGEtpU89__Um3s4dMGtQEgeO2LnPxQ&s' }
    ];

    let player;
    let ui;

    async function initPlayer() {
      const video = document.getElementById('video');
      const container = document.getElementById('video-wrapper');
      
      player = new shaka.Player(video);
      
      // Configuration for 4K and Multi-Audio
      player.configure({
        abr: { enabled: false }, // Isse quality manual change karne ka option milega
        streaming: {
          forceTransmuxTS: true,
          alwaysStreamText: true
        }
      });

      // UI Config - Quality aur Audio options enable karna
      const uiConfig = {
        'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'mute', 'volume', 'fullscreen', 'overflow_menu'],
        'overflowMenuElements': ['quality', 'language', 'audio_track', 'playback_rate'],
        'addLanguageControls': true,
        'addQualityControls': true
      };
      
      ui = new shaka.ui.Overlay(player, container, video);
      ui.configure(uiConfig);
    }

    async function playChannel(src, key) {
      const drmConfig = key ? { [key.split(':')[0]]: key.split(':')[1] } : {};
      player.configure({ drm: { clearKeys: drmConfig } });

      try {
        await player.load(src);
      } catch (e) { console.error('Error:', e); }
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    document.addEventListener('shaka-ui-loaded', async () => {
      await initPlayer();
      renderChannels(channels);
      if(channels.length > 0) playChannel(channels[0].src, channels[0].key);
    });

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }
  </script>
</body>
</html>
