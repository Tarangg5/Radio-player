<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Auto Detection</title>
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@0.3.13/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@1.5.0/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@0.3.0/dist/level-selector.min.js"></script>

  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
    
    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,242,255,0.3); box-shadow: 0 0 25px rgba(0,242,255,0.2); position: sticky; top: 0; z-index: 100; }
    #video-player { width: 100%; aspect-ratio: 16/9; }

    .controls-row { width: 100%; max-width: 850px; display: flex; gap: 10px; margin: 15px 0; }
    select, input#searchBar { padding: 12px; border-radius: 8px; background: #1a1a1a; color: white; border: 1px solid #333; outline: none; }
    input#searchBar { flex-grow: 1; }

    .channel-list { width: 100%; max-width: 850px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
    .channel-item { background: #151515; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
    .channel-item:hover { border-color: var(--primary); }
    .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.1); }
    .channel-item img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    #status-msg { font-size: 12px; color: #00ff88; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="player-section"><div id="video-player"></div></div>
  <div id="status-msg">READY TO PLAY</div>

  <div class="controls-row">
    <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterChannels()">
    <select id="audioSelect" onchange="changeAudioLanguage()"><option value="">Audio Tracks</option></select>
  </div>

  <div class="channel-list" id="channelList"></div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI (MPD)', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'AAJ TAK (HLS)', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://via.placeholder.com/40' },
      { name: 'ZEE TV (MPD)', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' }
    ];

    let player;
    let shakaInstance;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      document.getElementById('status-msg').innerText = "LOADING: " + name;

      // --- AUTO DETECTION LOGIC ---
      let mimeType = "application/x-mpegURL"; // Default HLS
      if (src.includes(".mpd")) {
        mimeType = "application/dash+xml";
      }

      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector],
        mimeType: mimeType, // यहाँ डिटेक्शन काम करता है
        shakaConfiguration: {
          drm: {
            clearKeys: key ? { [key.split(':')[0].trim()]: key.split(':')[1].trim() } : {}
          }
        },
        shakaOnBeforeLoad: function(sPlayer) {
          shakaInstance = sPlayer;
          sPlayer.addEventListener('trackschanged', () => {
            const select = document.getElementById('audioSelect');
            const langs = sPlayer.getAudioLanguages();
            select.innerHTML = '';
            langs.forEach(l => {
              const opt = document.createElement('option');
              opt.value = l;
              opt.text = l.toUpperCase();
              select.appendChild(opt);
            });
          });
        },
        levelSelectorConfig: { title: 'Quality', labelCallback: (lp) => lp.level.height + 'P' },
        width: '100%', height: '100%', autoPlay: true
      });
    }

    function changeAudioLanguage() {
      const lang = document.getElementById('audioSelect').value;
      if (shakaInstance && lang) shakaInstance.selectAudioLanguage(lang);
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
