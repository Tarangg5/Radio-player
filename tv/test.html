<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - VideoJS Fixed</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-eme@5.0.1/dist/videojs-contrib-eme.min.js"></script>

  <style>
    :root { --primary: #00f2ff; --bg: #0a0a0a; }
    body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    
    /* Player Window Fix */
    .player-box { width: 100%; max-width: 850px; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,242,255,0.2); position: sticky; top: 10px; z-index: 1000; }
    .video-js { width: 100% !important; height: auto !important; aspect-ratio: 16/9; }

    .search-box { width: 100%; max-width: 850px; margin: 20px 0; }
    #searchBar { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; }

    .channel-list { width: 100%; max-width: 850px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
    .channel-card { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
    .channel-card:hover { border-color: var(--primary); transform: scale(1.05); }
    .channel-card.active { border-color: #bc13fe; background: #221035; }
    .channel-card img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
    .channel-card span { font-size: 11px; font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    #status { margin-bottom: 10px; color: var(--primary); font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="status">SYSTEM READY</div>

  <div class="player-box">
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
  </div>

  <div class="search-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="search()">
  </div>

  <div class="channel-list" id="channelList"></div>

  <script>
    // Channels Data
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'ZEE TV', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
      { name: 'AAJ TAK', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://static.wikia.nocookie.net/logopedia/images/e/e0/Aaj_Tak_2021.png' }
    ];

    // Initialize Player
    const player = videojs('my-video');
    player.eme(); // DRM Support Enable

    function playChannel(url, key, name) {
      document.getElementById('status').innerText = "LOADING: " + name;

      // Type Detection
      let type = url.includes('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL';

      // DRM Setup
      let emeOptions = {};
      if (key && key.includes(':')) {
        const [kid, kvalue] = key.split(':');
        emeOptions = {
          applicationKeySystem: 'org.w3.clearkey',
          clearkeys: { [kid.trim()]: kvalue.trim() }
        };
      }

      // Load Source
      player.src({
        src: url,
        type: type,
        keySystems: emeOptions
      });

      player.play().catch(e => {
        document.getElementById('status').innerText = "ERROR: LINK BLOCKED OR EXPIRED";
      });
    }

    function render(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50'"><span>${ch.name}</span>`;
        card.onclick = () => {
          document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          playChannel(ch.src, ch.key, ch.name);
        };
        container.appendChild(card);
      });
    }

    function search() {
      const q = document.getElementById('searchBar').value.toLowerCase();
      render(channels.filter(c => c.name.toLowerCase().includes(q)));
    }

    // Default Load
    render(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
