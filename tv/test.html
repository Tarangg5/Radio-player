<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Pro Edition</title>
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@0.3.13/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
  
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --railway: #ffd700; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    
    .logo-container { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 2px solid var(--railway); box-shadow: 0 0 10px var(--railway); overflow: hidden; }
    .railway-logo { width: 85%; height: 85%; object-fit: contain; }

    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,242,255,0.3); box-shadow: 0 0 25px rgba(0,242,255,0.2); position: sticky; top: 0; z-index: 100; }
    #video-player { width: 100%; aspect-ratio: 16/9; }

    /* Quality & Audio Selectors */
    .extra-controls { width: 100%; max-width: 850px; margin: 15px 0; display: flex; gap: 10px; justify-content: center; }
    select#audioSelect { padding: 10px; border-radius: 8px; background: #1a1a1a; color: var(--primary); border: 1px solid var(--primary); outline: none; cursor: pointer; font-family: 'Segoe UI'; }

    .channel-box { width: 100%; max-width: 850px; margin-top: 5px; }
    input#searchBar { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; background: #111; color: white; border: 1px solid #333; box-sizing: border-box; outline: none; font-size: 16px; }
    input#searchBar:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,255,0.2); }

    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 5px; }
    .channel-item { background: #151515; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
    .channel-item:hover { transform: translateY(-5px); border-color: var(--primary); }
    .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.15); box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 5px; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge { margin: 20px; padding: 6px 18px; border-radius: 25px; border: 1px solid var(--railway); color: var(--railway); font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSHbTtG3wGQFbFUaChzCmNG2v5bAsK8ESlbw&s" alt="Logo" class="railway-logo">
  </div>

  <div class="player-section">
    <div id="video-player"></div>
  </div>

  <div class="extra-controls">
    <select id="audioSelect" onchange="switchAudio()">
      <option value="">SELECT LANGUAGE</option>
    </select>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <div class="badge">SONU LIVE</div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
      { name: 'AAJ TAK HD', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://static.wikia.nocookie.net/logopedia/images/e/e0/Aaj_Tak_2021.png' },
      // ... बाकी चैनल्स यहाँ जोड़ें
    ];

    let player;
    let shakaInstance;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      document.getElementById('audioSelect').innerHTML = '<option value="">Detecting Audio...</option>';

      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector],
        shakaConfiguration: {
          drm: { clearKeys: key ? { [key.split(':')[0].trim()]: key.split(':')[1].trim() } : {} }
        },
        shakaOnBeforeLoad: function(shakaPlayer) {
          shakaInstance = shakaPlayer;
          shakaPlayer.addEventListener('trackschanged', () => {
            const audioTracks = shakaPlayer.getAudioLanguages();
            const select = document.getElementById('audioSelect');
            select.innerHTML = '';
            audioTracks.forEach(lang => {
              const opt = document.createElement('option');
              opt.value = lang;
              opt.text = lang.toUpperCase() === 'HI' ? 'HINDI' : lang.toUpperCase() === 'EN' ? 'ENGLISH' : lang.toUpperCase();
              select.appendChild(opt);
            });
          });
        },
        levelSelectorConfig: {
          title: 'Quality',
          labelCallback: (lp) => lp.level.height + 'P'
        },
        width: '100%', height: '100%', autoPlay: true,
        mimeType: src.includes('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL'
      });
      document.title = "Sonu TV: " + name;
    }

    function switchAudio() {
      const lang = document.getElementById('audioSelect').value;
      if (shakaInstance && lang) shakaInstance.selectAudioLanguage(lang);
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45'"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
