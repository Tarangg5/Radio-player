<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Final Fixed</title>
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@0.3.13/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@1.5.0/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@0.3.0/dist/level-selector.min.js"></script>

  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --railway: #ffd700; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
    
    .logo-container { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 2px solid var(--railway); box-shadow: 0 0 10px var(--railway); overflow: hidden; }
    .railway-logo { width: 85%; height: 85%; object-fit: contain; }

    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,242,255,0.3); box-shadow: 0 0 25px rgba(0,242,255,0.2); position: sticky; top: 0; z-index: 100; }
    #video-player { width: 100%; aspect-ratio: 16/9; }

    .controls-row { width: 100%; max-width: 850px; display: flex; gap: 10px; margin: 15px 0; justify-content: center; align-items: center; flex-wrap: wrap; }
    select, input#searchBar { padding: 10px; border-radius: 8px; background: #1a1a1a; color: white; border: 1px solid #333; outline: none; }
    input#searchBar { flex-grow: 1; }

    .channel-list { width: 100%; max-width: 850px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .channel-item { background: #151515; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
    .channel-item:hover { transform: translateY(-3px); border-color: var(--primary); }
    .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.1); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge { margin: 20px; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--railway); color: var(--railway); font-size: 12px; }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSHbTtG3wGQFbFUaChzCmNG2v5bAsK8ESlbw&s" alt="Logo" class="railway-logo">
  </div>

  <div class="player-section"><div id="video-player"></div></div>

  <div class="controls-row">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <select id="audioSelect" onchange="changeAudioLanguage()">
      <option value="">Default Audio</option>
    </select>
  </div>

  <div class="channel-list" id="channelList"></div>

  <div class="badge">Sonu Live TV Pro</div>

  <script>
    // --- Configuration ---
    const workerUrl = ""; // अपना Cloudflare Worker URL यहाँ डालें (e.g. https://test.workers.dev/?url=)

    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'TNT SPORTS 4', src: 'https://ta.bia-cf.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/ecp6xidc5d/out/v1/b8a94677c56e4411aef7ecc2431cec0a/cenc.mpd', key: '192b1115da041585c77200128549efa1:634e10efe4abbb14be400a3ccbac0258', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
      { name: 'NDTV India', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Ndtvindia2/default/manifest.mpd', key: 'd78c01625c3f4ed98912609799298544:b91bb882f9624872ada6125006fe5c73', logo: 'https://d388d59m61mm0v.cloudfront.net/optimized/content/common/logos/channel/logos/iqfloc.png' }
    ];

    let player;
    let shakaInstance;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      
      const finalUrl = workerUrl ? workerUrl + encodeURIComponent(src) : src;
      const [kid, kvalue] = key ? key.split(':') : [null, null];

      player = new Clappr.Player({
        source: finalUrl,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector],
        shakaConfiguration: {
          drm: { clearKeys: kid ? { [kid.trim()]: kvalue.trim() } : {} },
          streaming: { rebufferingGoal: 15 }
        },
        shakaOnBeforeLoad: function(shakaPlayer) {
          shakaInstance = shakaPlayer;
          shakaPlayer.addEventListener('trackschanged', updateAudioTracks);
        },
        levelSelectorConfig: {
          title: 'Quality',
          labelCallback: (lp) => lp.level.height + 'P'
        },
        width: '100%', height: '100%', autoPlay: true,
        mimeType: src.endsWith('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL'
      });
    }

    function updateAudioTracks() {
      if (!shakaInstance) return;
      const languages = shakaInstance.getAudioLanguages();
      const select = document.getElementById('audioSelect');
      select.innerHTML = '';
      
      languages.forEach(lang => {
        const opt = document.createElement('option');
        opt.value = lang;
        opt.text = lang.toUpperCase() === 'HI' ? 'HINDI' : lang.toUpperCase() === 'EN' ? 'ENGLISH' : lang.toUpperCase();
        select.appendChild(opt);
      });
    }

    function changeAudioLanguage() {
      const lang = document.getElementById('audioSelect').value;
      if (shakaInstance && lang) shakaInstance.selectAudioLanguage(lang);
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
