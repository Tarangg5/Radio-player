<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON PLAYER - Professional Layout</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: #050505; 
            color: #fff; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .container { 
            width: 95%; 
            max-width: 1000px; /* कंटेनर थोड़ा चौड़ा किया */
            margin: auto; 
            background: rgba(15, 15, 15, 0.95); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; /* ग्लो कम करके सॉलिड बॉर्डर दिया */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            text-align: center;
        }

        h2 { 
            font-size: 1.8em; 
            margin: 10px 0 20px 0; 
            color: #ff0055; 
            text-transform: uppercase;
        }

        /* प्लेयर का साइज बड़ा किया और ग्लो हटाया */
        .player-box { 
            width: 100%; 
            max-width: 950px; 
            margin: 0 auto;
            border-radius: 8px; 
            border: 2px solid #444; 
            background: #000; 
            overflow: hidden; 
            position: relative;
        }

        video { 
            width: 100%; 
            aspect-ratio: 16/9; 
            display: block; 
        }

        .controls { 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-top: 20px; 
        }

        input#searchBar { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ff0055; 
            background: #111; 
            color: #fff; 
            font-family: 'Orbitron'; 
            box-sizing: border-box;
            outline: none;
        }

        .selector-group { 
            display: flex; 
            gap: 10px; 
            width: 100%;
        }

        .selector-item { 
            flex: 1; 
            text-align: left; 
        }

        label { 
            font-size: 0.7em; 
            color: #00f2fe; 
            margin-bottom: 5px; 
            display: block; 
            padding-left: 5px;
        }

        select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #111; 
            color: #fff; 
            font-family: 'Orbitron'; 
            outline: none;
            cursor: pointer;
        }

        #status { 
            margin-top: 10px; 
            color: #00e676; 
            font-size: 0.8em; 
            letter-spacing: 1px;
        }

        /* चैनल लिस्ट की सेटिंग */
        .channel-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
            margin-top: 25px; 
            width: 100%;
        }

        .channel-card { 
            background: #111; 
            padding: 10px 5px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: 1px solid #222; 
            transition: 0.2s; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .channel-card:hover { 
            border-color: #00f2fe; 
        }

        .channel-card.active { 
            border-color: #ff0055; 
            background: rgba(255, 0, 85, 0.05); 
        }

        .channel-card img { 
            width: 40px; 
            height: 40px; 
            object-fit: contain; 
            margin-bottom: 5px; 
        }

        .channel-card span { 
            display: block; 
            font-size: 8px; 
            font-weight: bold; 
            width: 90%;
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ff0055; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SONU NEON TV</h2>
    <div id="status">SYSTEM READY</div>

    <div class="player-box">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search Channel..." onkeyup="doSearch()">
        <div class="selector-group">
            <div class="selector-item">
                <label>QUALITY</label>
                <select id="qualitySelect" onchange="changeQuality()"><option value="auto">AUTO</option></select>
            </div>
            <div class="selector-item">
                <label>AUDIO</label>
                <select id="audioSelect" onchange="changeAudio()"><option value="default">DEFAULT</option></select>
            </div>
        </div>
    </div>

    <div class="channel-list" id="channelList"></div>
</div>

<script>
    // --- Script Same to Same Rkhi Hai ---
    const video = document.getElementById('video');
    const qSelect = document.getElementById('qualitySelect');
    const aSelect = document.getElementById('audioSelect');
    const status = document.getElementById('status');
    let shakaPlayer = null;
    let hlsInstance = null;

    const channels = [
        { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
        { name: 'WORLD CUP ENG', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/lz7yhtgbjb/out/v1/bedaa948e7a24dc0b5fd5d7b38534d8c/cenc.mpd', key: '470a5bda0ae8965c3ab4004c302bc1c8:b04888df6ed570c9435b97471504bd9b', logo: 'https://iili.io/1Nz0AP.png' },
        { name: 'TNT SPORTS 4', src: 'https://ta.bia-cf.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/ecp6xidc5d/out/v1/b8a94677c56e4411aef7ecc2431cec0a/cenc.mpd', key: '192b1115da041585c77200128549efa1:634e10efe4abbb14be400a3ccbac0258', logo: 'https://iili.io/1Nz0AP.png' },
        { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
        { name: 'AAJ TAK HD', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://static.wikia.nocookie.net/logopedia/images/e/e0/Aaj_Tak_2021.png' }
    ];

    async function play(url, key, name) {
        status.innerText = "LOADING: " + name;
        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        qSelect.innerHTML = '<option value="auto">AUTO</option>';
        aSelect.innerHTML = '<option value="default">DEFAULT</option>';

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    hlsInstance.levels.forEach((l, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; opt.text = l.height + 'P';
                        qSelect.appendChild(opt);
                    });
                    video.play();
                });
                hlsInstance.on(Hls.Events.AUDIO_TRACKS_UPDATED, (e, data) => {
                    aSelect.innerHTML = '';
                    data.audioTracks.forEach((t, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; opt.text = (t.name || t.lang || `Track ${i+1}`).toUpperCase();
                        aSelect.appendChild(opt);
                    });
                });
                status.innerText = "HLS MODE";
            }
        } else {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            if (key) {
                const parts = key.split(':');
                shakaPlayer.configure({ drm: { clearKeys: { [parts[0].trim()]: parts[1].trim() } } });
            }
            try {
                await shakaPlayer.load(url);
                shakaPlayer.getVariantTracks().forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t.id; opt.text = t.height + 'P';
                    qSelect.appendChild(opt);
                });
                const langs = shakaPlayer.getAudioLanguages();
                if(langs.length > 0) {
                    aSelect.innerHTML = '';
                    langs.forEach(l => {
                        let opt = document.createElement('option');
                        opt.value = l; 
                        opt.text = (l === 'hi' ? 'HINDI' : l === 'en' ? 'ENGLISH' : l).toUpperCase();
                        aSelect.appendChild(opt);
                    });
                }
                video.play();
                status.innerText = "DASH MODE";
            } catch (e) { status.innerText = "ERROR: " + e.code; }
        }
    }

    function changeQuality() {
        const val = qSelect.value;
        if (hlsInstance) hlsInstance.currentLevel = val === "auto" ? -1 : parseInt(val);
        if (shakaPlayer) {
            if (val === "auto") shakaPlayer.configure({ abr: { enabled: true } });
            else {
                shakaPlayer.configure({ abr: { enabled: false } });
                shakaPlayer.selectVariantTrack(shakaPlayer.getVariantTracks().find(t => t.id == val), true);
            }
        }
    }

    function changeAudio() {
        if (shakaPlayer) shakaPlayer.selectAudioLanguage(aSelect.value);
        if (hlsInstance) hlsInstance.audioTrack = parseInt(aSelect.value);
    }

    function render(data) {
        const container = document.getElementById('channelList');
        container.innerHTML = '';
        data.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'"><span>${ch.name}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                play(ch.src, ch.key, ch.name);
            };
            container.appendChild(card);
        });
    }

    function doSearch() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        render(channels.filter(c => c.name.toLowerCase().includes(q)));
    }

    render(channels);
    if(channels.length > 0) play(channels[0].src, channels[0].key, channels[0].name);
</script>
</body>
</html>
