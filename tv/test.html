<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - 4K Special</title>
  
  <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
  <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.debug.js"></script>

  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --railway: #ffd700; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
    
    .logo-container { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 2px solid var(--railway); box-shadow: 0 0 10px var(--railway); }
    .railway-logo { width: 80%; height: 80%; object-fit: contain; }

    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
    video { width: 100%; aspect-ratio: 16/9; }

    .channel-box { width: 100%; max-width: 850px; margin-top: 20px; }
    input#searchBar { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; background: #1a1a1a; color: white; border: 1px solid #444; box-sizing: border-box; outline: none; }

    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .channel-item { background: #111; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
    .channel-item:active { transform: scale(0.95); }
    .channel-item.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; pointer-events: none; }
    .channel-item span { display: block; font-size: 11px; font-weight: bold; pointer-events: none; }

    .badge { margin-top: 20px; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--railway); color: var(--railway); font-size: 12px; }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSHbTtG3wGQFbFUaChzCmNG2v5bAsK8ESlbw&s" class="railway-logo">
  </div>

  <div class="player-section">
    <video id="video-id"><source src="" type="application/x-mpegURL"></video>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <div class="badge">Sonu 4K Player</div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'WORLD CUP ENG', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/lz7yhtgbjb/out/v1/bedaa948e7a24dc0b5fd5d7b38534d8c/cenc.mpd', key: '470a5bda0ae8965c3ab4004c302bc1c8:b04888df6ed570c9435b97471504bd9b', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'NEWS18 HINDI', src: 'https://nw18live.cdn.jio.com/bpk-tv/News18_India_NW18_MOB/output01/News18_India_NW18_MOB-audio_98834_eng=98800-video=2293600.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyjjXoJrm98pN9PWgGodxByoe3Yc8bfIZaNM79xmEGUpJvFm0qPGr4T48&s=10' },
      { name: 'TRAVELXP 4K HDR', src: 'https://deltatesttatasky.akamaized.net/out/i/968284.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIHMD2TGEtpU89__Um3s4dMGtQEgeO2LnPxQ&s' },
      { name: 'Discovery Science', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Discoveryscience2/default/manifest.mpd', key: '5458f45efedb4d6f8aa6ac76c85b621b:dbf8a0a306a64525ba3012fd225370c0', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/vIA7TExn.png' }
    ];

    let playerInstance = null;

    async function playChannel(src, key, name) {
      const video = document.getElementById('video-id');
      
      // Destroy old instance
      if (playerInstance) {
          playerInstance.destroy();
      }

      // Shaka Player for DRM and 4K Dash/HLS
      const shakaInstance = new shaka.Player(video);
      const drmConfig = key ? { [key.split(':')[0]]: key.split(':')[1] } : {};
      
      shakaInstance.configure({
          drm: { clearKeys: drmConfig },
          streaming: { lowLatencyMode: true }
      });

      try {
          await shakaInstance.load(src);
          
          // Fluid Player UI for Quality & Language Selection
          playerInstance = fluidPlayer('video-id', {
              layoutControls: {
                  fillToContainer: true,
                  primaryColor: "#00f2ff",
                  autoPlay: true,
                  playbackRateControl: true,
                  allowDownload: false,
                  controlBar: { autoHide: true }
              }
          });
      } catch (e) {
          console.error("Error loading stream", e);
      }
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        
        // Touch/Click dono ke liye robust handler
        const handleAction = (e) => {
          e.preventDefault();
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };

        div.onclick = handleAction;
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    // Auto load first
    window.onload = () => {
        renderChannels(channels);
        if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
    };

  </script>
</body>
</html>
