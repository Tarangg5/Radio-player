<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Fix Loader</title>
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@0.3.13/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@1.5.0/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@0.3.0/dist/level-selector.min.js"></script>

  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; }
    
    .player-container { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: sticky; top: 10px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    #video-player { width: 100%; height: 100%; }

    .search-box { width: 100%; max-width: 850px; margin: 20px 0 10px 0; }
    #searchBar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; font-size: 16px; outline: none; }
    #searchBar:focus { border-color: var(--primary); }

    .channel-list { width: 100%; max-width: 850px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
    .channel-card { background: #1a1a1a; padding: 10px 5px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .channel-card:hover { border-color: var(--primary); background: #222; }
    .channel-card.active { border-color: var(--accent); background: #251030; }
    .channel-card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; pointer-events: none; }
    .channel-card span { display: block; font-size: 10px; font-weight: bold; pointer-events: none; white-space: nowrap; overflow: hidden; }

    #audio-switch { margin: 10px 0; background: #222; color: var(--primary); padding: 5px 10px; border-radius: 5px; border: 1px solid var(--primary); font-size: 12px; }
  </style>
</head>
<body>

  <div class="player-container">
    <div id="video-player"></div>
  </div>

  <div class="search-box">
    <select id="audio-switch" onchange="changeLang()"><option value="">Language</option></select>
    <input type="text" id="searchBar" placeholder="Search channel..." onkeyup="doSearch()">
  </div>

  <div class="channel-list" id="listContainer"></div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'AAJ TAK', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://static.wikia.nocookie.net/logopedia/images/e/e0/Aaj_Tak_2021.png' },
      { name: 'ZEE TV', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/7/75/Zee_TV_logo.svg/1200px-Zee_TV_logo.svg.png' }
    ];

    let mainPlayer = null;
    let shakaObj = null;

    function play(url, key) {
      // 1. पुराने प्लेयर को पूरी तरह साफ़ करें
      if (mainPlayer) {
        mainPlayer.destroy();
        mainPlayer = null;
      }

      // 2. MimeType पहचानें
      const isMpd = url.includes('.mpd');
      const mType = isMpd ? 'application/dash+xml' : 'application/x-mpegURL';

      // 3. नया प्लेयर बनाएँ
      mainPlayer = new Clappr.Player({
        source: url,
        parentId: "#video-player",
        mimeType: mType,
        plugins: [DashShakaPlayback, LevelSelector],
        width: '100%',
        height: '100%',
        autoPlay: true,
        shakaConfiguration: {
          drm: {
            clearKeys: key && key.includes(':') ? { [key.split(':')[0].trim()]: key.split(':')[1].trim() } : {}
          }
        },
        shakaOnBeforeLoad: function(s) {
          shakaObj = s;
          s.addEventListener('trackschanged', () => {
            const menu = document.getElementById('audio-switch');
            const langs = s.getAudioLanguages();
            menu.innerHTML = '<option value="">Language</option>';
            langs.forEach(l => {
              let opt = document.createElement('option');
              opt.value = l; opt.text = l.toUpperCase();
              menu.appendChild(opt);
            });
          });
        },
        levelSelectorConfig: { title: 'Quality', labelCallback: (l) => l.level.height + 'P' }
      });
    }

    function changeLang() {
      const val = document.getElementById('audio-switch').value;
      if (shakaObj && val) shakaObj.selectAudioLanguage(val);
    }

    function render(data) {
      const container = document.getElementById('listContainer');
      container.innerHTML = '';
      data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<img src="${item.logo}" onerror="this.src='https://via.placeholder.com/40'"><span>${item.name}</span>`;
        card.onclick = () => {
          document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          play(item.src, item.key);
        };
        container.appendChild(card);
      });
    }

    function doSearch() {
      const q = document.getElementById('searchBar').value.toLowerCase();
      render(channels.filter(c => c.name.toLowerCase().includes(q)));
    }

    // Start
    render(channels);
    if(channels.length > 0) play(channels[0].src, channels[0].key);
  </script>
</body>
</html>
