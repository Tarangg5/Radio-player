<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON TV - Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; padding: 20px; text-align: center; }
        .shaka-video-container { width: 100%; aspect-ratio: 16/9; border: 2px solid #ff0055; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; }
        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 25px; width: 100%; }
        .channel-card { background: #111; padding: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .channel-card:hover { border-color: #ff0055; transform: scale(1.05); }
        .channel-card img { width: 50px; height: 50px; object-fit: contain; }
        .channel-card span { display: block; font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #status { color: #00f2fe; margin-bottom: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #ff0055;">SONU NEON TV PRO</h2>
    <div id="status">INITIALIZING SYSTEM...</div>

    <div class="shaka-video-container" id="videoContainer">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="channel-list" id="channelList"></div>
</div>

<script>
    const video = document.getElementById('video');
    const container = document.getElementById('videoContainer');
    const status = document.getElementById('status');
    let player = null;
    let ui = null;

    // Aapka Channels Data (JioTV links ke liye 'cookie' field add kiya hai)
    const channels = [
        { 
            name: 'JIO TV EXAMPLE', 
            src: 'https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd', 
            key: '8ea9b607549252068e260a5f4d7dd321:350c0aaffedf51cc1502e9543c7c885e', 
            cookie: '__hdnea__=st=1773887993~exp=1773909593~acl=/*~hmac=b7397b7521203b5fe05c96bcd0731be1d6b3e0ffb4c6433535d3e623b707d752', // HMAC Cookie yahan daalein
            logo: 'https://via.placeholder.com/50', 
            cat: 'sports' 
        },
        { name: 'ZEE CINEMA SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeecinema/default/manifest.mpd', key: '43513b13f4b542e39c9265921dfc1726:b0b2678bcd274c37b888a6c987d502ed', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/qss9gFuH.png', cat: 'movies' },
        
  
    ];

    async function initPlayer() {
        shaka.polyfill.installAll();
        player = new shaka.Player(video);
        ui = new shaka.ui.Overlay(player, container, video);
        
        // Error Handling
        player.addEventListener('error', (e) => console.error('Error code', e.detail.code, 'object', e.detail));
        
        renderChannels();
        // Default pehla channel chalao
        if(channels.length > 0) playChannel(channels[0]);
    }

    async function playChannel(ch) {
        status.innerText = "LOADING: " + ch.name;

        // 1. Networking Config (Cookie aur Header logic)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            [span_2](start_span)// JioTV aur premium links ke liye Headers[span_2](end_span)
            request.headers['Referer'] = 'https://www.jiotv.com/';
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

            if (ch.cookie) {
                request.headers['Cookie'] = ch.cookie;
                [span_3](start_span)// URL mein token append karna agar manifest/segment request hai[span_3](end_span)
                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    const separator = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += separator + ch.cookie;
                }
            }
        });

        // 2. DRM Configuration
        if (ch.key) {
            const parts = ch.key.split(':');
            player.configure({
                drm: { clearKeys: { [parts[0].trim()]: parts[1].trim() } }
            });
        }

        // 3. Load Stream
        try {
            await player.load(ch.src);
            status.innerText = "PLAYING: " + ch.name;
        } catch (e) {
            status.innerText = "FAILED TO LOAD: " + ch.name;
        }
    }

    function renderChannels() {
        const list = document.getElementById('channelList');
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
            card.onclick = () => playChannel(ch);
            list.appendChild(card);
        });
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
