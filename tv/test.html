<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Pro Selector</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
  
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
    
    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,242,255,0.3); position: sticky; top: 0; z-index: 100; }
    #video-player { width: 100%; aspect-ratio: 16/9; }

    /* Language UI */
    .audio-control { width: 100%; max-width: 850px; margin: 10px 0; display: flex; align-items: center; gap: 10px; justify-content: center; }
    select#audioSelect { padding: 8px 15px; border-radius: 8px; background: #222; color: var(--primary); border: 1px solid var(--primary); outline: none; cursor: pointer; }

    .channel-box { width: 100%; max-width: 850px; margin-top: 10px; }
    input#searchBar { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #111; color: white; border: 1px solid #333; box-sizing: border-box; }
    
    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
    .channel-item { background: #151515; padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; }
    .channel-item img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .active { border-color: var(--accent) !important; background: rgba(188, 19, 254, 0.1) !important; }
  </style>
</head>
<body>

  <div class="player-section">
    <div id="video-player"></div>
  </div>

  <div class="audio-control">
    <span>AUDIO:</span>
    <select id="audioSelect" onchange="changeAudio()">
        <option value="">Detecting Tracks...</option>
    </select>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
      // ... बाकी चैनल्स यहाँ डाल दें
    ];

    let player;
    let currentShaka;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      document.getElementById('audioSelect').innerHTML = '<option>Detecting...</option>';

      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector],
        shakaConfiguration: {
          drm: { clearKeys: key ? { [key.split(':')[0]]: key.split(':')[1] } : {} }
        },
        shakaOnBeforeLoad: function(shakaPlayer) {
          currentShaka = shakaPlayer;
          
          // जैसे ही ट्रैक अपडेट हों, ड्रॉपडाउन भरें
          shakaPlayer.addEventListener('trackschanged', () => {
            const tracks = shakaPlayer.getVariantTracks();
            const audioTracks = shakaPlayer.getAudioLanguages();
            const select = document.getElementById('audioSelect');
            select.innerHTML = '';
            
            audioTracks.forEach(lang => {
              const opt = document.createElement('option');
              opt.value = lang;
              opt.text = lang.toUpperCase() === 'HI' ? 'HINDI' : lang.toUpperCase() === 'EN' ? 'ENGLISH' : lang.toUpperCase();
              select.appendChild(opt);
            });
          });
        },
        levelSelectorConfig: {
          title: 'Quality',
          labelCallback: (lp) => lp.level.height + 'P'
        },
        width: '100%', height: '100%', autoPlay: true,
        mimeType: src.includes('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL'
      });
    }

    function changeAudio() {
        const lang = document.getElementById('audioSelect').value;
        if (currentShaka && lang) {
            currentShaka.selectAudioLanguage(lang);
        }
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
