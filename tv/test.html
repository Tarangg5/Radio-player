<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Quality & Audio Pro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
  
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --railway: #ffd700; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
    
    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,242,255,0.3); position: sticky; top: 0; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    #video-player { width: 100%; aspect-ratio: 16/9; }

    /* Quality/Audio UI Customization */
    .clappr-controls[data-controls] .level_selector[data-level-selector] button { color: var(--primary) !important; font-weight: bold; }
    
    .channel-box { width: 100%; max-width: 850px; margin-top: 15px; }
    input#searchBar { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; background: #1a1a1a; color: white; border: 1px solid #333; outline: none; }
    
    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .channel-item { background: #151515; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
    .channel-item:hover { border-color: var(--primary); transform: translateY(-3px); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    
    .active { border-color: var(--accent) !important; background: rgba(188, 19, 254, 0.1) !important; }
  </style>
</head>
<body>

  <div class="player-section">
    <div id="video-player"></div>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <script>
    // आपका चैनल डेटा वही रहेगा
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'TNT SPORTS 4', src: 'https://ta.bia-cf.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/ecp6xidc5d/out/v1/b8a94677c56e4411aef7ecc2431cec0a/cenc.mpd', key: '192b1115da041585c77200128549efa1:634e10efe4abbb14be400a3ccbac0258', logo: 'https://iili.io/1Nz0AP.png' },
      // ... अन्य चैनल्स यहाँ जोड़ें
    ];

    let player;

    function playChannel(src, key, name) {
      if (player) player.destroy();

      // Shaka Player Configuration for Audio & DRM
      const shakaConfig = {
        drm: {
          clearKeys: key ? { [key.split(':')[0]]: key.split(':')[1] } : {}
        },
        preferredAudioLanguage: 'hi-IN' // डिफ़ॉल्ट हिंदी भाषा सेट करने के लिए
      };

      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector],
        shakaConfiguration: shakaConfig,
        shakaOnBeforeLoad: function(shakaInstance) {
            // लैंग्वेज सिलेक्शन को इनेबल करने के लिए
            window.shakaPlayerInstance = shakaInstance;
        },
        levelSelectorConfig: {
          title: 'Quality',
          labels: {
            // ये लेबल्स तब दिखेंगे जब ऑटो-डिटेक्शन काम न करे
            0: 'Low', 1: 'Medium', 2: 'High'
          },
          labelCallback: function(playbackLevel, customLabel) {
            return playbackLevel.level.height + 'P'; // उदा. 720P, 1080P
          }
        },
        width: '100%',
        height: '100%',
        autoPlay: true,
        preload: 'auto',
        mimeType: src.includes('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL'
      });

      // ऑडियो ट्रैक की जानकारी कंसोल में देखने और ऑटो-सिलेक्शन के लिए
      player.on(Clappr.Events.PLAYER_READY, function() {
        console.log("Player Ready: " + name);
      });
    }

    // चैनल्स रेंडर करने का फंक्शन
    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45'"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    // इनिशियलाइजेशन
    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);

  </script>
</body>
</html>
