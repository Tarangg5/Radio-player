<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONU NEON TV - Categories Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        
        body { font-family: 'Orbitron', sans-serif; background: #050505; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        .container { width: 95%; max-width: 1000px; margin: auto; background: rgba(15, 15, 15, 0.95); padding: 20px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center; }

        h2 { font-size: 1.8em; margin: 10px 0 20px 0; color: #ff0055; text-transform: uppercase; }

        .player-box { width: 100%; max-width: 950px; margin: 0 auto; border-radius: 8px; border: 2px solid #444; background: #000; overflow: hidden; position: relative; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .controls { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        /* Category Buttons */
        .category-wrapper { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; justify-content: center; }
        .category-wrapper::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background: #111; color: #aaa; cursor: pointer; white-space: nowrap; font-size: 0.7em; transition: 0.3s; }
        .cat-btn.active { background: #ff0055; color: #fff; border-color: #ff0055; }

        input#searchBar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ff0055; background: #111; color: #fff; font-family: 'Orbitron'; box-sizing: border-box; outline: none; }

        .selector-group { display: flex; gap: 10px; width: 100%; }
        .selector-item { flex: 1; text-align: left; }
        label { font-size: 0.7em; color: #00f2fe; margin-bottom: 5px; display: block; padding-left: 5px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; font-family: 'Orbitron'; outline: none; cursor: pointer; }

        #status { margin-top: 10px; color: #00e676; font-size: 0.8em; }

        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; width: 100%; }
        .channel-card { background: #111; padding: 10px 5px; border-radius: 10px; cursor: pointer; border: 1px solid #222; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .channel-card:hover { border-color: #00f2fe; }
        .channel-card.active { border-color: #ff0055; background: rgba(255, 0, 85, 0.05); }
        .channel-card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
        .channel-card span { display: block; font-size: 8px; font-weight: bold; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>SONU NEON TV</h2>
    <div id="status">SYSTEM READY</div>

    <div class="player-box">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="category-wrapper" id="catWrapper">
            <button class="cat-btn active" onclick="filterCat('all', this)">ALL</button>
            <button class="cat-btn" onclick="filterCat('sports', this)">SPORTS</button>
            <button class="cat-btn" onclick="filterCat('news', this)">NEWS</button>
            <button class="cat-btn" onclick="filterCat('movies', this)">MOVIES</button>
        </div>
        <input type="text" id="searchBar" placeholder="Search Channel..." onkeyup="doSearch()">
        <div class="selector-group">
            <div class="selector-item">
                <label>QUALITY</label>
                <select id="qualitySelect" onchange="changeQuality()"><option value="auto">AUTO</option></select>
            </div>
            <div class="selector-item">
                <label>AUDIO</label>
                <select id="audioSelect" onchange="changeAudio()"><option value="default">DEFAULT</option></select>
            </div>
        </div>
    </div>

    <div class="channel-list" id="channelList"></div>
</div>

<script>
    const video = document.getElementById('video');
    const qSelect = document.getElementById('qualitySelect');
    const aSelect = document.getElementById('audioSelect');
    const status = document.getElementById('status');
    let shakaPlayer = null;
    let hlsInstance = null;
    let currentCategory = 'all';

    // चैनल्स में 'cat' प्रॉपर्टी जोड़ दी है
    const channels = [
  // --- SPORTS ---

  { name: 'WORLD CUP ENG', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/lz7yhtgbjb/out/v1/bedaa948e7a24dc0b5fd5d7b38534d8c/cenc.mpd', key: '470a5bda0ae8965c3ab4004c302bc1c8:b04888df6ed570c9435b97471504bd9b', logo: 'https://iili.io/1Nz0AP.png', cat: 'sports' },
  { name: 'TRAVELXP 4K HDR', src: 'https://deltatesttatasky.akamaized.net/out/i/968284.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIHMD2TGEtpU89__Um3s4dMGtQEgeO2LnPxQ&s', cat: 'sports' },

  // --- ZEE REGIONAL (ये रहे तुम्हारे चैनल) ---
  { name: 'ZEE MARATHI', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeemarathi/default/manifest.mpd', key: '2a8d6c938ea647248f7a10eedc39f097:7d81feb84ed84bd88fdc5ca9de3c16da', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/4bimlHJj.png', cat: 'movies' },
  { name: 'ZEE BANGLA HD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeebangla/default/manifest.mpd', key: '1df83e058b864da896c9288eef63b113:fc32f26239054b56aab48225305598fe', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/9XHWylqs.png', cat: 'movies' },
  { name: 'ZEE BANGLA CINEMA', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeebanglacinema/default/manifest.mpd', key: 'fbbfd9ce4bbe4d818b16df7dfe89f05b:1e96d0f88ef740e982d6f6105721c8bc', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/gLSSl4nG.png', cat: 'movies' },
  { name: 'ZEE TALKIES', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetalkies/default/manifest.mpd', key: 'f081f32756374c3d8265e1a1e029614e:356a3a6d8ce34d49a84ad464b20b1a3e', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/VGfIqjrc.png', cat: 'movies' },
  { name: 'ZEE KANNADA HD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeekannada/default/manifest.mpd', key: '50e714b65ead453cbfab9b20bed5c79d:bc08e108b9ee4f65b99cb9dad9532f3f', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/1PrOGXAh.png', cat: 'movies' },
  { name: 'ZEE TELUGU HD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetelgu/default/manifest.mpd', key: '1ce5cd75a6ad44a38a7d1b8dbaf9c330:657fc8e7d533456cb0644fe03458a4b2', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/6vNzRaRK.png', cat: 'movies' },
  { name: 'ZEE BIHAR JHARKHAND', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeebiharjharkhand/default/manifest.mpd', key: 'e1ec6098b5014ac7aae0b37f72d5e85e:c04950f25d8e4107a96e828e7911e53b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/5zkMvEbF.png', cat: 'movies' },

  // --- MOVIES ---
  { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png', cat: 'movies' },
  { name: 'ZEE CINEMA SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeecinema/default/manifest.mpd', key: '43513b13f4b542e39c9265921dfc1726:b0b2678bcd274c37b888a6c987d502ed', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/qss9gFuH.png', cat: 'movies' },
  { name: 'AND TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Andtv/default/manifest.mpd', key: '26df86eeebb04d7fbc45c948f76e81fd:5f3a23f1a73c4c96ababce5fffe7b06b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/T1CCvaAQ.png', cat: 'movies' },

  // --- NEWS ---
  { name: 'AAJ TAK HD', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://yt3.googleusercontent.com/MqNixkUgqY_rJiz34wzNf4yhWdrQWQ-F2pu9tJ7TXsSRjseqbUVASuAhuIN-L74cm6lZljkssA=s900-c-k-c0x00ffffff-no-rj', cat: 'news' },
  { name: 'NDTV INDIA', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Ndtvindia2/default/manifest.mpd', key: 'd78c01625c3f4ed98912609799298544:b91bb882f9624872ada6125006fe5c73', logo: 'https://d388d59m61mm0v.cloudfront.net/optimized/content/common/logos/channel/logos/iqfloc.png', cat: 'news' },

  // --- KIDS ---
  { name: 'DISCOVERY KIDS', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Discoverykids2/default/manifest.mpd', key: '601f58d4b7094d2baf78c85d1d9cb6c9:609e0cc03198455fa36fd2cc3e7f940d', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/RzedYhFG.png', cat: 'kids' }
];


    async function play(url, key, name) {
        status.innerText = "LOADING: " + name;
        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        qSelect.innerHTML = '<option value="auto">AUTO</option>';
        aSelect.innerHTML = '<option value="default">DEFAULT</option>';

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    hlsInstance.levels.forEach((l, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; opt.text = l.height + 'P';
                        qSelect.appendChild(opt);
                    });
                    video.play();
                });
                hlsInstance.on(Hls.Events.AUDIO_TRACKS_UPDATED, (e, data) => {
                    aSelect.innerHTML = '';
                    data.audioTracks.forEach((t, i) => {
                        let opt = document.createElement('option');
                        opt.value = i; opt.text = (t.name || t.lang || `Track ${i+1}`).toUpperCase();
                        aSelect.appendChild(opt);
                    });
                });
                status.innerText = "HLS MODE";
            }
        } else {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            if (key) {
                const parts = key.split(':');
                shakaPlayer.configure({ drm: { clearKeys: { [parts[0].trim()]: parts[1].trim() } } });
            }
            try {
                await shakaPlayer.load(url);
                shakaPlayer.getVariantTracks().forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t.id; opt.text = t.height + 'P';
                    qSelect.appendChild(opt);
                });
                const langs = shakaPlayer.getAudioLanguages();
                if(langs.length > 0) {
                    aSelect.innerHTML = '';
                    langs.forEach(l => {
                        let opt = document.createElement('option');
                        opt.value = l; 
                        opt.text = (l === 'hi' ? 'HINDI' : l === 'en' ? 'ENGLISH' : l).toUpperCase();
                        aSelect.appendChild(opt);
                    });
                }
                video.play();
                status.innerText = "DASH MODE";
            } catch (e) { status.innerText = "ERROR: " + e.code; }
        }
    }

    function changeQuality() {
        const val = qSelect.value;
        if (hlsInstance) hlsInstance.currentLevel = val === "auto" ? -1 : parseInt(val);
        if (shakaPlayer) {
            if (val === "auto") shakaPlayer.configure({ abr: { enabled: true } });
            else {
                shakaPlayer.configure({ abr: { enabled: false } });
                shakaPlayer.selectVariantTrack(shakaPlayer.getVariantTracks().find(t => t.id == val), true);
            }
        }
    }

    function changeAudio() {
        if (shakaPlayer) shakaPlayer.selectAudioLanguage(aSelect.value);
        if (hlsInstance) hlsInstance.audioTrack = parseInt(aSelect.value);
    }

    function filterCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        doSearch();
    }

    function render(data) {
        const container = document.getElementById('channelList');
        container.innerHTML = '';
        data.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'"><span>${ch.name}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                play(ch.src, ch.key, ch.name);
            };
            container.appendChild(card);
        });
    }

    function doSearch() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        let filtered = channels;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(c => c.cat === currentCategory);
        }
        filtered = filtered.filter(c => c.name.toLowerCase().includes(q));
        render(filtered);
    }

    render(channels);
    if(channels.length > 0) play(channels[0].src, channels[0].key, channels[0].name);
</script>
</body>
</html>
