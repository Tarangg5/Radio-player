<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu TV - Supported Fix</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
  
  <style>
    :root { --neon: #00f2ff; --bg: #050505; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    
    /* Fixed Player Window */
    .video-container { width: 100%; max-width: 800px; border: 2px solid #333; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
    video { width: 100%; aspect-ratio: 16/9; display: block; }

    .search-box { width: 100%; max-width: 800px; margin: 20px 0; }
    input#searchBar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; outline: none; }

    .channel-list { width: 100%; max-width: 800px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .card { background: #151515; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #222; }
    .card:hover { border-color: var(--neon); background: #1a1a1a; }
    .card.active { border-color: #bc13fe; background: #200a2b; }
    .card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
    .card span { display: block; font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    #status { font-size: 12px; color: var(--neon); margin-bottom: 8px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="status">System: Online</div>

  <div class="video-container" id="videoParent">
    <video id="video" autoplay></video>
  </div>

  <div class="search-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="search()">
  </div>

  <div class="channel-list" id="list"></div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'ZEE TV', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/7/75/Zee_TV_logo.svg/1200px-Zee_TV_logo.svg.png' },
      { name: 'AAJ TAK', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8', key: '', logo: 'https://static.wikia.nocookie.net/logopedia/images/e/e0/Aaj_Tak_2021.png' }
    ];

    let player;

    async function initPlayer() {
      shaka.polyfill.installAll();
      const video = document.getElementById('video');
      player = new shaka.Player(video);

      // Error Listener
      player.addEventListener('error', (e) => console.error('Error code', e.detail.code, 'object', e.detail));
    }

    async function loadChannel(url, key, name) {
      document.getElementById('status').innerText = "Loading: " + name;
      
      try {
        // DRM Configuration Fix
        const config = {
          drm: {
            clearKeys: key && key.includes(':') ? { [key.split(':')[0].trim()]: key.split(':')[1].trim() } : {}
          }
        };
        
        await player.configure(config);
        await player.load(url);
        document.getElementById('status').innerText = "Streaming: " + name;
      } catch (e) {
        document.getElementById('status').innerText = "Error: Use a Proxy / Worker";
        console.error('Load failed', e);
      }
    }

    function render(data) {
      const list = document.getElementById('list');
      list.innerHTML = '';
      data.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'"><span>${ch.name}</span>`;
        card.onclick = () => {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          loadChannel(ch.src, ch.key, ch.name);
        };
        list.appendChild(card);
      });
    }

    function search() {
      const q = document.getElementById('searchBar').value.toLowerCase();
      render(channels.filter(c => c.name.toLowerCase().includes(q)));
    }

    // Bootstrap
    initPlayer().then(() => {
      render(channels);
      if(channels.length > 0) loadChannel(channels[0].src, channels[0].key, channels[0].name);
    });
  </script>
</body>
</html>
