<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - Pro Fix</title>
  
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-dash/5.1.1/videojs-contrib-dash.min.js"></script>

  <style>
    :root { --primary: #00f2ff; --bg: #050505; --railway: #ffd700; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; }
    
    .player-section { width: 100%; max-width: 800px; margin: 0 auto; position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 2px solid #333; }
    .video-js { width: 100%; aspect-ratio: 16/9; }

    .channel-box { max-width: 800px; margin: 15px auto; padding: 10px; }
    input#searchBar { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: #1a1a1a; color: white; border: 1px solid #444; outline: none; box-sizing: border-box; }

    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .channel-item { background: #111; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
    .channel-item:active { transform: scale(0.95); background: #222; }
    .channel-item.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
    .channel-item img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; pointer-events: none; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Quality & Audio Icons fix */
    .vjs-control-bar { background: rgba(0,0,0,0.7) !important; }
  </style>
</head>
<body>

  <div class="player-section" id="player-wrapper">
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'></video>
  </div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <script>
    const channels = [
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab' },
      { name: 'AAJ TAK HD', src: 'https://aajtakhdlive-amd.akamaized.net/hls/live/2014415/aajtakhd/aajtakhdlive/live_1080p/chunks.m3u8' },
      { name: 'NEWS18 HINDI', src: 'https://nw18live.cdn.jio.com/bpk-tv/News18_India_NW18_MOB/output01/News18_India_NW18_MOB-audio_98834_eng=98800-video=2293600.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb' },
      { name: 'Discovery Science', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Discoveryscience2/default/manifest.mpd', key: '5458f45efedb4d6f8aa6ac76c85b621b:dbf8a0a306a64525ba3012fd225370c0' }
    ];

    let player = videojs('my-video');

    function playChannel(src, key) {
      const type = src.includes('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL';
      
      const drmConfig = key ? {
        "org.w3.clearkey": {
          "clearkeys": { [key.split(':')[0]]: key.split(':')[1] }
        }
      } : {};

      player.src({
        src: src,
        type: type,
        keySystems: drmConfig
      });

      player.play().catch(e => console.log("Auto-play blocked or error", e));
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="https://via.placeholder.com/40?text=TV"><span>${ch.name}</span>`;
        
        div.onclick = () => {
          playChannel(ch.src, ch.key);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    // Load default
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key);

  </script>
</body>
</html>
