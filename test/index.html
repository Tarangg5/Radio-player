<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ultimate IPTV Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
}

#channels{
width:300px;
height:100vh;
overflow:auto;
background:#1b1b1b;
float:left;
}

.channel{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.channel:hover{
background:#333;
}

#player{
margin-left:300px;
padding:20px;
}

video{
width:100%;
max-width:900px;
}

</style>

</head>

<body>

<div id="channels"></div>

<div id="player">
<video id="video" controls autoplay></video>
</div>

<script>

const proxy = "https://quiet-lake-4bc3.sonuujamuicamp.workers.dev?url=";

const channels = [
{
name:"Star Sports 1 Hindi",
stream:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
keyid:"8ea9b607549252068e260a5f4d7dd321",
key:"350c0aaffedf51cc1502e9543c7c885e"
}
];

const channelList = document.getElementById("channels");

channels.forEach((c,i)=>{
const div = document.createElement("div");
div.className="channel";
div.innerText=c.name;
div.onclick=()=>playChannel(i);
channelList.appendChild(div);
});

async function playChannel(i){

const c = channels[i];

const video = document.getElementById("video");

const player = new shaka.Player(video);

player.configure({
drm:{
clearKeys:{
[c.keyid]:c.key
}
}
});

await player.load(proxy + encodeURIComponent(c.stream));

}

playChannel(0);

</script>

</body>
</html>
