<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Live TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        
        /* Video Player Header Fixed */
        .player-container { width: 100%; max-width: 900px; position: sticky; top: 0; z-index: 100; background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        video { width: 100%; aspect-ratio: 16/9; display: block; border-bottom: 2px solid var(--primary); }

        .content-box { width: 100%; max-width: 850px; padding: 15px; box-sizing: border-box; }
        
        /* Search Bar */
        input#searchBar { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; 
            background: var(--card); color: white; border: 1px solid #333; 
            outline: none; font-size: 16px; transition: 0.3s;
        }
        input#searchBar:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        /* Channel Grid */
        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .channel-item { 
            background: var(--card); padding: 15px 10px; border-radius: 15px; 
            text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.3s;
        }
        .channel-item:hover { transform: translateY(-5px); border-color: var(--primary); }
        .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.1); }
        
        .channel-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; border-radius: 8px; }
        .channel-item span { display: block; font-size: 12px; font-weight: bold; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="content-box">
        <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
        <div class="channel-list" id="channelList"></div>
    </div>

            const video = document.getElementById('video');
            if (player) await player.destroy();
            
            player = new shaka.Player(video);

            player.configure({
                abr: { enabled: true },
                drm: { clearKeys: key ? { [key.split(':')[0]]: key.split(':')[1] } : {} },
                streaming: { bufferingGoal: 30 }
            });

                await player.load(src);
            } catch (e) {
                console.error('Error loading channel', e);
            }
        }
