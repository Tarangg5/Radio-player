<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Live TV - MOG Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <style>
        :root { --primary: #00f2ff; --bg: #050505; --card: #121212; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        
        /* Video Container */
        .player-container { width: 100%; max-width: 900px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--primary); }
        #video-container { width: 100%; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }

        /* Content Area */
        .content { width: 100%; max-width: 850px; padding: 15px; box-sizing: border-box; }
        input#searchBar { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; background: var(--card); color: white; border: 1px solid #333; outline: none; font-size: 16px; }

        /* Channel Grid */
        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 12px; }
        .channel-item { background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .channel-item:hover { transform: translateY(-3px); border-color: var(--primary); }
        .channel-item.active { border-color: #bc13fe; background: rgba(188, 19, 254, 0.1); }
        .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 5px; }
        .channel-item span { display: block; font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="player-container">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
        </div>
    </div>

    <div class="content">
        <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
        <div class="channel-list" id="channelList"></div>
    </div>

    <script>
        const channels = [
            [span_0](start_span)// Sports & World Cup (M3U data)[span_0](end_span)
            { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
            { name: 'WORLD CUP ENG', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/lz7yhtgbjb/out/v1/bedaa948e7a24dc0b5fd5d7b38534d8c/cenc.mpd', key: '470a5bda0ae8965c3ab4004c302bc1c8:b04888df6ed570c9435b97471504bd9b', logo: 'https://iili.io/1Nz0AP.png' },
            { name: 'TNT SPORTS 1', src: 'https://ottb.live.cf.ww.aiv-cdn.net/lhr-nitro/live/dash/enc/wf8usag51e/out/v1/bd3b0c314fff4bb1ab4693358f3cd2d3/cenc.mpd', key: 'd0f2e5c39e70c18f29bf77768a1ad89a:d6853c51fcf37a18905f0609972395d7', logo: 'https://iili.io/1Nz0AP.png' },
            
            [span_1](start_span)// Travel & News (M3U data)[span_1](end_span)
            { name: 'TRAVELXP 4K HDR', src: 'https://deltatesttatasky.akamaized.net/out/i/968284.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
            { name: 'ABP NEWS', src: 'https://d2l4ar6y3mrs4k.cloudfront.net/live-streaming/abpnews-livetv/master.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
            { name: 'ZEE NEWS', src: 'https://dknttpxmr0dwf.cloudfront.net/index_57.m3u8', key: '', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
            
            [span_2](start_span)// Entertainment (M3U data)[span_2](end_span)
            { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
            { name: 'DISCOVERY TURBO', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Discoveryturbo2/default/manifest.mpd', key: 'c011525969e44b99a86059dbb3cdf4e8:6700a5d93203417b8585f7de7dd1a09b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/6eCv1iuk.png' }
        ];

        let player;
        let ui;

        async function initApp() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                const video = document.getElementById('video');
                const videoContainer = document.getElementById('video-container');
                player = new shaka.Player(video);
                ui = new shaka.ui.Overlay(player, videoContainer, video);

                // Configuration for Quality and Full Screen
                const config = {
                    'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'fullscreen', 'overflow_menu']
                };
                ui.configure(config);

                renderChannels(channels);
                loadChannel(channels[0]);
            }
        }

        async function loadChannel(ch) {
            try {
                if (ch.key) {
                    player.configure({
                        drm: { clearKeys: { [ch.key.split(':')[0]]: ch.key.split(':')[1] } }
                    });
                } else {
                    player.configure({ drm: { clearKeys: {} } });
                }
                await player.load(ch.src);
            } catch (e) {
                console.error("Channel Load Error", e);
            }
        }

        function renderChannels(list) {
            const container = document.getElementById('channelList');
            container.innerHTML = '';
            list.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45/222/fff?text=TV'"><span>${ch.name}</span>`;
                div.onclick = () => {
                    loadChannel(ch);
                    document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                container.appendChild(div);
            });
        }

        function filterChannels() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
        }

        document.addEventListener('shaka-ui-loaded', initApp);
        document.addEventListener('DOMContentLoaded', () => {
            if (!player) initApp();
        });
    </script>
</body>
</html>
