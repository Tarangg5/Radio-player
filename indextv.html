<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV - HD Quality</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector@latest/dist/level-selector.min.js"></script>
  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; --railway: #ffd700; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .logo-container { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 2px solid var(--railway); box-shadow: 0 0 10px var(--railway); overflow: hidden; }
    .railway-logo { width: 85%; height: 85%; object-fit: contain; }
    .player-section { width: 100%; max-width: 850px; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,242,255,0.3); position: sticky; top: 0; z-index: 100; }
    #video-player { width: 100%; aspect-ratio: 16/9; }
    .channel-box { width: 100%; max-width: 850px; margin-top: 15px; }
    input#searchBar { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; background: #1a1a1a; color: white; border: 1px solid #333; box-sizing: border-box; outline: none; }
    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 5px; }
    .channel-item { background: #151515; padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
    .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.15); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 5px; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; color: #eee; overflow: hidden; text-overflow: ellipsis; }
    .badge { margin: 20px 0; padding: 6px 18px; border-radius: 25px; border: 1px solid var(--railway); color: var(--railway); font-size: 11px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Indian_Railways_logo.svg/200px-Indian_Railways_logo.svg.png" alt="IR Logo" class="railway-logo">
  </div>

  <div class="player-section"><div id="video-player"></div></div>

  <div class="channel-box">
    <input type="text" id="searchBar" placeholder="Search (ABP, Star, Zee...)" onkeyup="filterChannels()">
    <div class="channel-list" id="channelList"></div>
  </div>

  <div class="badge">Sonu Raj | CCTC - E.C. Railway | MOG Station</div>

  <script>
    const channels = [
      { name: 'ABP NEWS', src: 'https://d2l4ar6y3mrs4k.cloudfront.net/live-streaming/abpnews-livetv/master.m3u8', key: '', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
      { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
      { name: 'TRAVELXP 4K', src: 'https://deltatesttatasky.akamaized.net/out/i/968284.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
      { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' },
      { name: 'DISCOVERY TURBO', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Discoveryturbo2/default/manifest.mpd', key: 'c011525969e44b99a86059dbb3cdf4e8:6700a5d93203417b8585f7de7dd1a09b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/6eCv1iuk.png' },
      { name: 'AND TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Andtv/default/manifest.mpd', key: '26df86eeebb04d7fbc45c948f76e81fd:5f3a23f1a73c4c96ababce5fffe7b06b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/T1CCvaAQ.png' },
      { name: 'KOREAN DRAMA', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Koreandramas2/default/manifest.mpd', key: 'ed197e7253c04946903f03bad9afac91:99ebb8683ea74b70a9fda1cbdc2cc1b4', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/BNu8WvFw.png' }
    ];

    let player;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      const drmConfig = key ? { [key.split(':')[0]]: key.split(':')[1] } : {};
      
      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector],
        shakaConfiguration: { drm: { clearKeys: drmConfig } },
        levelSelectorConfig: { title: 'Quality', labels: { 3: 'HD', 2: 'High', 1: 'Med', 0: 'Low' } },
        width: '100%', height: '100%', autoPlay: true,
        mediacontrol: { seekbar: var(--primary), buttons: var(--primary) }
      });
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45/222/fff?text=TV'"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
