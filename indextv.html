<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Live TV - MOG Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; --railway: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        
        .logo-container { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 2px solid var(--railway); box-shadow: 0 0 10px var(--railway); overflow: hidden; }
        .railway-logo { width: 85%; height: 85%; object-fit: contain; }

        .player-container { width: 100%; max-width: 850px; position: sticky; top: 0; z-index: 100; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--primary); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .channel-box { width: 100%; max-width: 850px; margin-top: 15px; }
        input#searchBar { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; background: #1a1a1a; color: white; border: 1px solid #333; outline: none; }

        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .channel-item { background: #151515; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.1); }
        .channel-item img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
        .channel-item span { display: block; font-size: 10px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .badge { margin-top: 20px; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--railway); color: var(--railway); font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Indian_Railways_logo.svg/200px-Indian_Railways_logo.svg.png" alt="IR Logo" class="railway-logo">
    </div>

    <div class="player-container">
        <video id="video" controls autoplay></video>
    </div>

    <div class="channel-box">
        <input type="text" id="searchBar" placeholder="Search Channels..." onkeyup="filterChannels()">
        <div class="channel-list" id="channelList"></div>
    </div>

    <div class="badge">Sonu Raj | CCTC - E.C. Railway | MOG Station</div>

    <script>
        const channels = [
            // Sports (World Cup)
            { name: 'WORLD CUP HINDI', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nn1qrdjaha/out/v1/bc4fa7d9cebf47858bebf14ad589025e/cenc.mpd', key: '9909e33838e1152cc512c4636f513f8f:02f67060c94bcc3307280f505ad508ab', logo: 'https://iili.io/1Nz0AP.png' },
            { name: 'WORLD CUP ENG', src: 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/lz7yhtgbjb/out/v1/bedaa948e7a24dc0b5fd5d7b38534d8c/cenc.mpd', key: '470a5bda0ae8965c3ab4004c302bc1c8:b04888df6ed570c9435b97471504bd9b', logo: 'https://iili.io/1Nz0AP.png' },
            { name: 'TNT SPORTS 4', src: 'https://ta.bia-cf.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/ecp6xidc5d/out/v1/b8a94677c56e4411aef7ecc2431cec0a/cenc.mpd', key: '192b1115da041585c77200128549efa1:634e10efe4abbb14be400a3ccbac0258', logo: 'https://iili.io/1Nz0AP.png' },
            
            // News & Entertainment
            { name: 'ABP NEWS', src: 'https://d2l4ar6y3mrs4k.cloudfront.net/live-streaming/abpnews-livetv/master.m3u8', key: '', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
            { name: 'TRAVELXP 4K', src: 'https://deltatesttatasky.akamaized.net/out/i/968284.m3u8', key: '6da8c268d58a0fe4ff75d297359a8ad7:eb0ae4c2c24a52070154499bb09a36cb', logo: 'https://i.postimg.cc/hvvtSwCV/Astro-Cricket.png' },
            { name: 'ZEE TV SD', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/manifest.mpd', key: 'ed068cf84f0640ccbc7c0e395c0a272e:bb722190f2bb446391020411a7d0828b', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/yHNSuG1V.png' }
        ];

        let player;

        async function initPlayer(src, key) {
            const video = document.getElementById('video');
            if (player) await player.destroy();
            
            player = new shaka.Player(video);
            
            // Error handling
            player.addEventListener('error', (e) => console.error('Error code', e.detail.code, 'object', e.detail));

            // DRM Config
            if (key) {
                const [keyId, keyVal] = key.split(':');
                player.configure({
                    drm: {
                        clearKeys: { [keyId]: keyVal }
                    }
                });
            }

            try {
                await player.load(src);
                console.log('The video has now been loaded!');
            } catch (e) {
                console.error('Error loading video', e);
            }
        }

        function renderChannels(list) {
            const container = document.getElementById('channelList');
            container.innerHTML = '';
            list.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'"><span>${ch.name}</span>`;
                div.onclick = () => {
                    initPlayer(ch.src, ch.key);
                    document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                };
                container.appendChild(div);
            });
        }

        function filterChannels() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
        }

        // Initialize Shaka Player polyfills
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            renderChannels(channels);
            initPlayer(channels[0].src, channels[0].key);
        } else {
            console.error('Browser not supported!');
        }
    </script>
</body>
</html>
