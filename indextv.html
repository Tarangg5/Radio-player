<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Live TV Pro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector@latest/dist/level-selector.min.js"></script>

  <style>
    :root { --primary: #00f2ff; --accent: #bc13fe; --bg: #050505; --card: #111111; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    
    /* Header Section */
    .header { padding: 15px; text-align: center; width: 100%; background: #000; border-bottom: 1px solid #222; }
    .header h1 { margin: 0; font-size: 20px; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

    /* Player Box */
    .player-section { width: 100%; max-width: 900px; background: #000; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #video-player { width: 100%; aspect-ratio: 16/9; }

    /* Search & Filters */
    .controls { width: 100%; max-width: 850px; padding: 15px; box-sizing: border-box; }
    input#searchBar { width: 100%; padding: 14px; border-radius: 12px; background: var(--card); color: white; border: 1px solid #333; outline: none; font-size: 16px; transition: 0.3s; }
    input#searchBar:focus { border-color: var(--primary); }

    /* Channel Grid */
    .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 12px; padding-bottom: 30px; }
    .channel-item { background: var(--card); padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
    .channel-item:hover { transform: translateY(-3px); border-color: var(--primary); }
    .channel-item.active { border-color: var(--accent); background: rgba(188, 19, 254, 0.1); }
    .channel-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 5px; background: transparent; }
    .channel-item span { display: block; font-size: 10px; font-weight: bold; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Level Selector (Quality) UI Fix */
    .level_selector button { background: transparent; color: white; border: none; cursor: pointer; font-size: 14px; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
  </style>
</head>
<body>

  <div class="controls">

      { name: 'ZING', src: 'https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zing/default/manifest.mpd', key: 'f0fb14eebe474a6ab74c8301d55a7224:f9f8b2e30704458b8db844a285ce32be', logo: 'https://imagesdishtvd2h.whatsonindia.com/dasimages/channel/landscape/360x270/Nyi83z1G.png' }
    ];

    let player;

    function playChannel(src, key, name) {
      if (player) player.destroy();
      
      const drmConfig = key ? { [key.split(':')[0]]: key.split(':')[1] } : {};
      
      player = new Clappr.Player({
        source: src,
        parentId: "#video-player",
        plugins: [DashShakaPlayback, LevelSelector], // Both plugins integrated
        shakaConfiguration: {
          drm: { clearKeys: drmConfig }
        },
        levelSelectorConfig: {
          title: 'Quality',
          labels: { 3: '1080p', 2: '720p', 1: '480p', 0: 'Auto' }
        },
        width: '100%',
        height: '100%',
        autoPlay: true,
        mimeType: src.endsWith('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL'
      });
    }

    function renderChannels(list) {
      const container = document.getElementById('channelList');
      container.innerHTML = '';
      list.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45/222/fff?text=TV'"><span>${ch.name}</span>`;
        div.onclick = () => {
          playChannel(ch.src, ch.key, ch.name);
          document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
          div.classList.add('active');
          window.scrollTo({top: 0, behavior: 'smooth'});
        };
        container.appendChild(div);
      });
    }

    function filterChannels() {
      const term = document.getElementById('searchBar').value.toLowerCase();
      renderChannels(channels.filter(c => c.name.toLowerCase().includes(term)));
    }

    renderChannels(channels);
    if(channels.length > 0) playChannel(channels[0].src, channels[0].key, channels[0].name);
  </script>
</body>
</html>
