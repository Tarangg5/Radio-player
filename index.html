<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Player By Sonu</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { 
      --primary: #00f2ff; 
      --accent: #bc13fe;
      --bg: #050505; 
      --card: #111111; 
      --railway-gold: #ffd700;
    }
    
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
    
    /* Moving Train Animation */
    .train-track {
      position: fixed;
      bottom: 80px;
      width: 100%;
      height: 20px;
      z-index: 0;
      opacity: 0.3;
      pointer-events: none;
    }
    .train {
      position: absolute;
      font-size: 30px;
      white-space: nowrap;
      animation: trainMove 20s linear infinite;
    }
    @keyframes trainMove {
      from { left: -200px; }
      to { left: 100%; }
    }

    .player-container { 
      width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 24px; position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.1), 0 0 40px rgba(188, 19, 254, 0.1);
      z-index: 1;
    }

    .header h1 { 
      margin: 0; font-size: 20px; text-align: center;
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 2px; text-transform: uppercase;
    }
    
    .now-playing-box { 
      margin: 20px 0; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; 
      display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05);
    }

    .visualizer { display: flex; align-items: flex-end; height: 35px; gap: 4px; }
    .bar { width: 5px; background: var(--primary); border-radius: 10px; height: 4px; transition: 0.2s; }
    .playing .bar { animation: neonBounce 0.6s infinite alternate; }
    @keyframes neonBounce { 0% { height: 4px; } 100% { height: 30px; } }

    audio { width: 100%; margin-bottom: 20px; filter: invert(1) hue-rotate(180deg) contrast(1.5); }
    
    #searchBar {
      width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px;
      background: #1a1a1a; color: white; border: 1px solid #333; outline: none; box-sizing: border-box;
    }

    .playlist { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; }
    .playlist li { 
      background: rgba(255,255,255,0.02); margin-bottom: 5px; padding: 12px 15px; cursor: pointer; 
      border-radius: 10px; font-size: 14px; color: #aaa; transition: 0.3s;
    }
    .playlist li.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 242, 255, 0.3); }
    
    .railway-footer {
      margin-top: 25px; padding: 15px; text-align: center; width: 100%; max-width: 420px; z-index: 1;
    }
    .badge {
      display: inline-block; padding: 5px 15px; border-radius: 20px;
      background: rgba(255, 215, 0, 0.1); border: 1px solid var(--railway-gold);
      color: var(--railway-gold); font-size: 12px; font-weight: bold;
    }
    .employee-info { font-size: 13px; margin-top: 8px; color: #888; }
  </style>
</head>
<body>

  <div class="train-track">
    <div class="train">🚂🚃🚃🚃🚃🚃🚃</div>
  </div>

  <div class="player-container" id="mainContainer">
    <div class="header">
        <h1>SONU LIVE RADIO</h1>
        <div class="now-playing-box">
            <div class="info">
                <span id="status-label" style="font-size:10px; color:var(--primary)">Now On Air</span>
                <div id="nowPlaying" style="font-weight:bold; font-size:16px;">Select Station</div>
            </div>
            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>
    
    <input type="text" id="searchBar" placeholder="Find your station..." onkeyup="filterStations()">
    
    <audio id="audioPlayer" controls></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <div class="railway-footer">
    <div class="badge">Chief Commercial-cum-Ticket Clerk</div>
    <div class="employee-info">Proudly Serving at MOG Station, Indian Railways</div>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const searchBar = document.getElementById('searchBar');
    const nowPlayingText = document.getElementById('nowPlaying');
    const mainContainer = document.getElementById('mainContainer');
    const visualizer = document.getElementById('visualizer');
    
    const audioFiles = [
      { name: 'Vivid Bharati (AIR)', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio001/chunklist.m3u8' },
      { name: 'FM Gold Delhi', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio005/hlspbaudio00564kbps.m3u8' },
      { name: 'FM Rainbow', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio004/hlspbaudio00464kbps.m3u8' },
      { name: 'AIR News 24x7', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio002/hlspbaudio00264kbps.m3u8' },  
      { name: 'Akashwani Patna', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio087/chunklist.m3u8' },
      { name: 'Akashwani Sasaram', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio075/chunklist.m3u8' },
      { name: 'VBS Delhi', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio238/hlspbaudio23864kbps.m3u8' },
      { name: 'Indraprasth', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio006/hlspbaudio00664kbps.m3u8' },
      { name: 'Akashwani Chhattisgarh', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio118/chunklist.m3u8' }, 
      { name: 'Radio Mirchi 98.3', src: 'https://shoutcast.radiomirchi.com/mirchi_hindi_hits_high' },
      { name: 'Radio City Hindi', src: 'https://prclive4.listenon.in/Hindi' },
      { name: 'Big FM 92.7', src: 'https://stream.zeno.fm/dbstwo3dvhhtv' },
      { name: 'Red FM 93.5', src: 'https://stream.zeno.fm/9phrkb1e3v8uv' },
      { name: 'Md Rafi Hits', src: 'https://stream.zeno.fm/2xx62x8ztm0uv' },
      { name: 'Kishore Kumar Radio', src: 'https://server.mixify.in:8010/radio.mp3' },
      { name: 'Bollywood 90s Hits', src: 'https://stream.zeno.fm/143d7gty24zuv' },
      { name: 'Bhakti Sagar', src: 'https://stream.zeno.fm/67vun8t99p8uv' },
      { name: 'Lata Mangeshkar Hits', src: 'https://stream.zeno.fm/cg37e2m0yv8uv' },
      { name: 'Ishq FM Love Songs', src: 'https://drive.uber.radio/uber/bollywoodlove/icecast.audio' },
      { name: 'Radio Retro Bollywood', src: 'https://stream.zeno.fm/g372rxef798uv' },
      { name: 'Radio Baingan', src: 'https://stream.zeno.fm/eyxg23ky4x8uv' }
    ];

    let hls;
    function detachHLS() { if (hls) { hls.destroy(); hls = null; } }

    audioPlayer.onplay = () => { mainContainer.classList.add('playing'); visualizer.classList.add('playing'); };
    audioPlayer.onpause = () => { mainContainer.classList.remove('playing'); visualizer.classList.remove('playing'); };

    function loadAudio(audioSrc, listItem, stationName) {
      detachHLS();
      nowPlayingText.textContent = stationName;
      document.title = "🎶 " + stationName;
      if (audioSrc.endsWith('.m3u8') && window.Hls && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(audioSrc);
        hls.attachMedia(audioPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, () => audioPlayer.play());
      } else {
        audioPlayer.src = audioSrc;
        audioPlayer.load();
        audioPlayer.play().catch(() => { nowPlayingText.textContent = "Offline"; });
      }
      document.querySelectorAll('.playlist li').forEach(item => item.classList.remove('active'));
      listItem.classList.add('active');
    }

    function renderPlaylist(list) {
      playlist.innerHTML = '';
      list.forEach((audio) => {
        const li = document.createElement('li');
        li.textContent = audio.name;
        li.onclick = () => loadAudio(audio.src, li, audio.name);
        playlist.appendChild(li);
      });
    }

    function filterStations() {
      const term = searchBar.value.toLowerCase();
      const filtered = audioFiles.filter(s => s.name.toLowerCase().includes(term));
      renderPlaylist(filtered);
    }
    renderPlaylist(audioFiles);
  </script>
</body>
</html>
