<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Player By Sonu</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --primary: #24a4f9; --bg: #0f0f12; --card: #181920; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: white; display: flex; justify-content: center; }
    
    .player-container { width: 100%; max-width: 450px; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #222; position: relative; overflow: hidden; }
    
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { margin: 0; color: #4caf50; font-size: 22px; letter-spacing: 1px; }
    
    /* Now Playing & Equalizer Area */
    .now-playing-box { margin-top: 15px; background: #21222b; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
    .info { flex: 1; overflow: hidden; }
    #status-label { font-size: 9px; color: var(--primary); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    #nowPlaying { color: #fff; font-weight: bold; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Visualizer Bars */
    .visualizer { display: flex; align-items: flex-end; height: 30px; gap: 3px; }
    .bar { width: 4px; background: var(--primary); border-radius: 2px; height: 5px; }
    .playing .bar { animation: bounce 0.8s infinite alternate; }
    .bar:nth-child(2) { animation-delay: 0.2s; }
    .bar:nth-child(3) { animation-delay: 0.4s; }
    .bar:nth-child(4) { animation-delay: 0.1s; }

    @keyframes bounce { 
        0% { height: 5px; } 
        100% { height: 25px; } 
    }

    audio { width: 100%; margin: 20px 0; height: 40px; filter: invert(100%) hue-rotate(150deg); }
    
    #searchBar {
      width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333;
      background: #2c2e3a; color: white; font-size: 15px;
    }

    .playlist { list-style: none; padding: 0; max-height: 350px; overflow-y: auto; border-radius: 10px; background: #111; }
    .playlist li { background: #181920; color: #aaa; padding: 15px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.3s; font-size: 14px; }
    .playlist li.active { background: #24a4f910; color: var(--primary); font-weight: bold; border-left: 4px solid var(--primary); }
    .playlist li:hover { background: #222; color: #fff; }
    
    .playlist::-webkit-scrollbar { width: 4px; }
    .playlist::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="header">
        <h1>SONU LIVE RADIO</h1>
        <div class="now-playing-box" id="playingContainer">
            <div class="info">
                <span id="status-label">Streaming Now</span>
                <div id="nowPlaying">Select a Station</div>
            </div>
            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>
    
    <input type="text" id="searchBar" placeholder="Find a radio station..." onkeyup="filterStations()">
    
    <audio id="audioPlayer" controls></audio>
    <ul class="playlist" id="playlist"></ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const searchBar = document.getElementById('searchBar');
    const nowPlayingText = document.getElementById('nowPlaying');
    const playingContainer = document.getElementById('playingContainer');
    
    const audioFiles = [
      { name: 'Vivid Bharati (AIR)', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio001/chunklist.m3u8' },
      { name: 'FM Gold Delhi', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio005/hlspbaudio00564kbps.m3u8' },
      { name: 'FM Rainbow', src: 'https://airhlspush.pc.cdn.bitgravity.com/httppush/hlspbaudio004/hlspbaudio00464kbps.m3u8' },
      { name: 'Akashwani Patna', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio087/chunklist.m3u8' },
      { name: 'Akashwani Sasaram', src: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio075/chunklist.m3u8' },
      { name: 'Radio Mirchi 98.3', src: 'https://shoutcast.radiomirchi.com/mirchi_hindi_hits_high' },
      { name: 'Radio City Hindi', src: 'https://prclive4.listenon.in/Hindi' },
      { name: 'Big FM 92.7', src: 'https://stream.zeno.fm/dbstwo3dvhhtv' },
      { name: 'Red FM 93.5', src: 'https://stream.zeno.fm/9phrkb1e3v8uv' },
      { name: 'Md Rafi Hits', src: 'https://stream.zeno.fm/2xx62x8ztm0uv' },
      { name: 'Kishore Kumar Radio', src: 'https://server.mixify.in:8010/radio.mp3' },
      { name: 'Bollywood 90s Hits', src: 'https://stream.zeno.fm/143d7gty24zuv' }
    ];

    let hls;

    function detachHLS() {
      if (hls) { hls.destroy(); hls = null; }
    }

    // Handle Visualizer Animation
    audioPlayer.onplay = () => playingContainer.classList.add('playing');
    audioPlayer.onpause = () => playingContainer.classList.remove('playing');

    function loadAudio(audioSrc, listItem, stationName) {
      detachHLS();
      nowPlayingText.textContent = stationName;
      document.title = "▶ " + stationName;
      
      if (audioSrc.endsWith('.m3u8') && window.Hls && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(audioSrc);
        hls.attachMedia(audioPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, () => audioPlayer.play());
      } else {
        audioPlayer.src = audioSrc;
        audioPlayer.load();
        audioPlayer.play().catch(() => { nowPlayingText.textContent = "Offline / Error"; });
      }

      document.querySelectorAll('.playlist li').forEach(item => item.classList.remove('active'));
      listItem.classList.add('active');
    }

    function renderPlaylist(list) {
      playlist.innerHTML = '';
      list.forEach((audio) => {
        const li = document.createElement('li');
        li.textContent = audio.name;
        li.onclick = () => loadAudio(audio.src, li, audio.name);
        playlist.appendChild(li);
      });
    }

    function filterStations() {
      const term = searchBar.value.toLowerCase();
      const filtered = audioFiles.filter(s => s.name.toLowerCase().includes(term));
      renderPlaylist(filtered);
    }

    renderPlaylist(audioFiles);
  </script>
</body>
</html>
